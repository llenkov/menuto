<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Огнище — Доставка</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F6F7;
  --surface:#FFFFFF;
  --surface-2:#F1F1F3;
  --surface-3:#E7E7EA;
  --border:#E6E6E9;
  --text:#1B1B1D;
  --text-dim:#79797F;
  --text-faint:#B7B7BC;
  --ember:#E2202C;
  --ember-dim:#B5151F;
  --ember-glow:#E2202C30;
  --gold:#C98A1F;
  --green:#2E9E4F;
  --red:#D92D20;
  --radius:14px;
  --radius-sm:9px;
  --font-display:'Inter', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'Inter', sans-serif;
  color-scheme:light;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;color:inherit;}
svg{stroke:currentColor;}
input,select,textarea{font-family:inherit;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--ember-glow);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px;}

#shell{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,0,.06);
}
#root{flex:1;padding-bottom:84px;}
.scr{animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(.93);}}
@media (prefers-reduced-motion: reduce){.scr{animation:none;}}

/* ---------- typography helpers ---------- */
h1,h2,h3{font-family:var(--font-display);font-weight:800;margin:0;letter-spacing:-.01em;}
.eyebrow{font-family:var(--font-body);font-weight:800;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ember);}
.muted{color:var(--text-dim);}
.mono{font-family:var(--font-body);}
.price{font-family:var(--font-body);font-weight:800;}

/* ---------- layout helpers ---------- */
.pad{padding:18px;}
.row{display:flex;align-items:center;}
.between{justify-content:space-between;}
.gap8{gap:8px;}
.gap12{gap:12px;}
.col{display:flex;flex-direction:column;}
.center-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

/* ---------- divider ---------- */
.ember-divider{
  height:2px;
  margin:22px 0 18px;
  background:linear-gradient(90deg, transparent, var(--ember) 18%, var(--gold) 50%, var(--ember) 82%, transparent);
  position:relative;
  opacity:.85;
  border-radius:2px;
}

/* ---------- buttons ---------- */
.btn{
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--text);
  border-radius:11px;
  padding:13px 18px;
  font-size:15px;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:transform .12s ease, opacity .12s ease;
  width:100%;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(180deg, var(--ember), var(--ember-dim));border:none;color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);}
.btn-sm{padding:8px 12px;font-size:13px;width:auto;border-radius:9px;}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn:disabled{opacity:.4;pointer-events:none;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text);
}

/* ---------- inputs ---------- */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:12.5px;color:var(--text-dim);}
.field input,.field select,.field textarea{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  padding:11px 13px;
  font-size:15px;
  outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ember);}
.field textarea{resize:vertical;min-height:64px;}

/* ---------- header / logo ---------- */
.logo-mark{
  width:46px;height:46px;border-radius:13px;
  background:radial-gradient(circle at 30% 25%, var(--gold), var(--ember) 60%, var(--ember-dim));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px -4px var(--ember-glow);
  color:#fff;overflow:hidden;
}
.logo-mark img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-name{font-family:var(--font-display);font-size:21px;font-weight:800;letter-spacing:-.01em;}
.topbar{
  position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg, var(--bg) 80%, transparent);
  padding:16px 18px 6px;
}

/* ---------- solid red app bar (customer screens) ---------- */
.redbar{
  position:sticky;top:0;z-index:6;
  background:linear-gradient(180deg, var(--ember), var(--ember-dim));
  color:#fff;padding:14px 14px;display:flex;align-items:center;gap:10px;
}
.bar-icon{
  width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;position:relative;
}
.bar-logo{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:#fff;overflow:hidden;}
.bar-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.bar-title{font-weight:800;font-size:16px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.cart-badge{
  position:absolute;top:-4px;right:-4px;background:#fff;color:var(--ember);font-size:10px;font-weight:800;
  min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;
}

/* ---------- cards ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
}
.banner{
  border-radius:var(--radius);
  padding:16px;
  background:linear-gradient(120deg, #FFEDEC, #FFF7F2);
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.banner::after{
  content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle, var(--ember-glow), transparent 70%);
}

/* ---------- category grid (home) ---------- */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:6px 18px 18px;}
.cat-tile{cursor:pointer;}
.cat-tile-img{
  width:100%;height:108px;border-radius:14px;overflow:hidden;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:34px;border:1px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.cat-tile-img img{width:100%;height:100%;object-fit:cover;display:block;}
.cat-tile-label{margin-top:8px;font-weight:800;font-size:12.5px;text-align:center;text-transform:uppercase;letter-spacing:.02em;color:var(--text);}

/* ---------- category chips ---------- */
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:4px 18px 14px;scrollbar-width:none;}
.chiprow::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;padding:9px 15px;border-radius:20px;font-size:13.5px;font-weight:600;
  border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);white-space:nowrap;
}
.chip.active{background:var(--ember);color:#fff;border-color:var(--ember);}

/* ---------- promo carousel ---------- */
.promo-row{display:flex;gap:12px;overflow-x:auto;padding:2px 18px 6px;scrollbar-width:none;}
.promo-row::-webkit-scrollbar{display:none;}
.promo-card{
  flex:0 0 auto;width:210px;height:120px;border-radius:14px;overflow:hidden;position:relative;
  border:1px solid var(--border);cursor:pointer;background:linear-gradient(135deg,var(--ember),var(--ember-dim));
}
.promo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.promo-card .promo-fade{position:absolute;inset:0;background:linear-gradient(180deg, transparent 35%, rgba(10,7,5,.85));}
.promo-card .promo-text{position:absolute;bottom:9px;left:11px;right:11px;color:#fff;}

/* ---------- menu item ---------- */
.menu-item{
  display:flex;gap:12px;align-items:flex-start;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.menu-item:last-child{border-bottom:none;}
.item-emoji{
  width:58px;height:58px;border-radius:13px;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 58px;
  border:1px solid var(--border);overflow:hidden;
}
.item-emoji img{width:100%;height:100%;object-fit:cover;display:block;}
.item-name{font-weight:700;font-size:15px;}
.item-desc{font-size:12.5px;color:var(--text-dim);margin-top:2px;line-height:1.4;}
.strike{text-decoration:line-through;color:var(--text-faint);font-size:12.5px;margin-right:6px;}
.qty-stepper{display:flex;align-items:center;gap:10px;}
.qty-btn{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text);
}
.add-pill{
  border:1px solid var(--ember);color:var(--ember);background:#fff;border-radius:18px;
  padding:6px 14px;font-size:13px;font-weight:700;
}

/* ---------- bottom nav ---------- */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;padding:10px 6px 14px;z-index:10;
}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-faint);font-size:11px;font-weight:600;background:none;border:none;flex:1;padding:4px;}
.tab.active{color:var(--ember);}
.tab svg{stroke:currentColor;}

/* ---------- floating cart bar ---------- */
.cart-fab{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);width:calc(100% - 36px);max-width:444px;
  background:linear-gradient(180deg, var(--ember), var(--ember-dim));color:#fff;border-radius:14px;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;font-weight:700;z-index:9;
  box-shadow:0 8px 24px -6px var(--ember-glow);border:none;
}

/* ---------- product detail footer ---------- */
/* ---------- AI chat widget ---------- */
.ai-fab{
  position:fixed;bottom:92px;right:16px;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(180deg,var(--ember),var(--ember-dim));
  border:none;color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px -4px var(--ember-glow);z-index:9;cursor:pointer;
}
.ai-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:70vh;
  background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;
  display:flex;flex-direction:column;z-index:20;
  box-shadow:0 -10px 40px rgba(0,0,0,.12);animation:slideup .22s ease;
}
.ai-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.ai-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ember),var(--gold));display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;}
.ai-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.ai-msg{max-width:82%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.45;}
.ai-msg.bot{background:var(--surface-2);align-self:flex-start;border-bottom-left-radius:4px;}
.ai-msg.user{background:var(--ember);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.ai-msg.typing{opacity:.6;}
.ai-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;}
.ai-input-row input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:22px;padding:10px 14px;font-size:14px;outline:none;}
.ai-input-row input:focus{border-color:var(--ember);}
.ai-send{width:40px;height:40px;border-radius:50%;background:var(--ember);border:none;color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.ai-mic{width:40px;height:40px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.ai-mic.listening{background:var(--ember-glow);border-color:var(--ember);color:var(--ember);animation:pulse 1s ease infinite;}
.ai-checkout-btn{display:block;width:100%;margin-top:10px;background:linear-gradient(180deg,var(--ember),var(--ember-dim));color:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}

.detail-footer{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:#fff;border-top:1px solid var(--border);padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  display:flex;gap:10px;z-index:10;
}
.fav-btn{
  width:48px;height:48px;border-radius:12px;border:1px solid var(--border);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);flex:0 0 auto;
}
.fav-btn.active{background:var(--ember-glow);border-color:var(--ember);color:var(--ember);}

/* ---------- toast ---------- */
#toast{
  position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-30px);
  background:#1B1B1D;border:1px solid var(--border);color:#fff;
  padding:11px 18px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:50;
  opacity:0;transition:all .25s ease;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- order status stepper ---------- */
.stepper{display:flex;align-items:center;margin:24px 0;}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.step-dot{
  width:16px;height:16px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border);z-index:2;
}
.step.lit .step-dot{background:var(--ember);border-color:var(--ember);box-shadow:0 0 12px 2px var(--ember-glow);}
.step-line{position:absolute;top:7px;left:50%;width:100%;height:2px;background:var(--border);z-index:1;}
.step.lit .step-line{background:linear-gradient(90deg, var(--ember), var(--gold));}
.step:last-child .step-line{display:none;}
.step-label{font-size:10.5px;color:var(--text-faint);margin-top:8px;text-align:center;max-width:64px;}
.step.lit .step-label{color:var(--text);}

/* ---------- restaurant admin ---------- */
.admin-tabs{display:flex;gap:6px;padding:0 18px 14px;overflow-x:auto;}
.admin-tab{padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:13px;font-weight:600;white-space:nowrap;flex:0 0 auto;}
.admin-tab.active{background:#fff;color:var(--ember);border-color:var(--ember);}
.order-card{border-left:3px solid var(--ember);}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.02em;}
.badge.pending{background:#FFF1CC;color:#8A6D1B;}
.badge.preparing{background:#FDE7CC;color:#A35B00;}
.badge.delivering{background:#DCEBFF;color:#1D5FAE;}
.badge.delivered{background:#DEF5E1;color:#1F8A3D;}
.badge.cancelled{background:#FBE0DE;color:#C23A2E;}

/* ---------- modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(20,18,18,.5);z-index:30;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 18px 28px;
  animation:slideup .22s ease;box-shadow:0 -10px 30px rgba(0,0,0,.12);
}
@keyframes slideup{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px;}

.switchrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.switch{width:42px;height:24px;border-radius:14px;background:var(--surface-3);border:1px solid var(--border);position:relative;flex:0 0 auto;}
.switch.on{background:var(--ember);}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s ease;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.switch.on::after{left:21px;}

.role-card{
  width:100%;border:1px solid var(--border);background:var(--surface);border-radius:16px;
  padding:20px;display:flex;align-items:center;gap:14px;text-align:left;color:var(--text);
}
.role-card:active{transform:scale(.985);}

.empty-state{text-align:center;padding:50px 24px;color:var(--text-dim);}
</style>
</head>
<body>
<div id="shell">
  <div id="root"></div>
</div>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

/* ============================= SUPABASE CLIENT ============================= */
// ╔══════════════════════════════════════════════════════════════╗
// ║  НАСТРОЙКА — попълни и запази файла веднъж                  ║
// ║  Supabase Dashboard → Settings → API                        ║
// ╚══════════════════════════════════════════════════════════════╝
const SUPABASE_URL  = ''; const SUPABASE_URL  = 'https://mefsshlwyuokdhetxlmy.supabase.co';   // напр. 'https://xxxx.supabase.co'
const SUPABASE_ANON = 'sb_publishable_7SWmUNnMb3aDsJAK6tYr0g_5_NgPwfk';   // anon public key (eyJ…)
// ──────────────────────────────────────────────────────────────
// Ако горните константи са попълнени → setup екранът НИКОГА
// не се показва на клиентите. Промяна само чрез 5 клика на лого.
// ──────────────────────────────────────────────────────────────

const CFG_KEY = 'og_supabase_cfg';
let SB = null;

function loadConfig(){
  // 1. Ако константите са хардкоднати в кода → използвай ги
  if(SUPABASE_URL && SUPABASE_ANON){
    return { url: SUPABASE_URL, key: SUPABASE_ANON };
  }
  // 2. Иначе вземи от localStorage (admin setup)
  try{ return JSON.parse(localStorage.getItem(CFG_KEY)); }catch(e){ return null; }
}
function saveConfig(url, key){
  localStorage.setItem(CFG_KEY, JSON.stringify({ url, key }));
}

function initSupabase(url, key){
  const { createClient } = window.supabase;
  SB = createClient(url, key, {
    realtime:{ params:{ eventsPerSecond:10 } }
  });
  return SB;
}

/* ============================= ICONS ============================= */
function icon(name, size){
  size = size || 22;
  const s = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"`;
  const map = {
    menu:`<svg ${s}><circle cx="8" cy="7" r="2.6"/><path d="M8 12v7"/><path d="M16 5v6"/><circle cx="16" cy="14" r="2.6"/><path d="M16 17v2"/></svg>`,
    cart:`<svg ${s}><path d="M4 6h2l1.6 10.2A2 2 0 0 0 9.5 18h7.8a2 2 0 0 0 2-1.7L20.5 9H6.2"/><circle cx="9.5" cy="21" r="1.3"/><circle cx="17" cy="21" r="1.3"/></svg>`,
    user:`<svg ${s}><circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg>`,
    box:`<svg ${s}><path d="M3.5 8 12 4l8.5 4-8.5 4-8.5-4Z"/><path d="M3.5 8v8l8.5 4 8.5-4V8"/><path d="M12 12v8"/></svg>`,
    list:`<svg ${s}><path d="M9 6h11"/><path d="M9 12h11"/><path d="M9 18h11"/><circle cx="4.2" cy="6" r="1.4"/><circle cx="4.2" cy="12" r="1.4"/><circle cx="4.2" cy="18" r="1.4"/></svg>`,
    tag:`<svg ${s}><path d="M11 4h6a1 1 0 0 1 1 1v6L9.5 19.5a1.5 1.5 0 0 1-2.1 0L4 16.1a1.5 1.5 0 0 1 0-2.1L11 4Z"/><circle cx="14.3" cy="7.7" r="1.3"/></svg>`,
    star:`<svg ${s}><path d="M12 3.5l2.6 5.4 5.9.7-4.3 4.1 1.1 5.9L12 16.8l-5.3 2.8 1.1-5.9-4.3-4.1 5.9-.7Z"/></svg>`,
    chevR:`<svg ${s}><path d="M9 5l7 7-7 7"/></svg>`,

/* ============================= DATABASE LAYER ============================= */
const DB = {

  // ---------- helpers ----------
  _toItem(row){
    const ids = (row.category_ids && row.category_ids.length) ? row.category_ids : (row.category_id ? [row.category_id] : []);
    return { id:row.id, categoryIds:ids, name:row.name, desc:row.description||'',
             price:parseFloat(row.price), emoji:row.emoji||'🍽️', image:row.image||null, available:row.available };
  },
  _toPromo(row){
    return { id:row.id, title:row.title, desc:row.description||'', image:row.image||null,
             type:row.type, scope:row.scope||'order', categoryId:row.category_id||null,
             percent:parseFloat(row.percent)||0, code:row.code||null,
             comboItems:row.combo_items||null, comboPrice:parseFloat(row.combo_price)||0,
             active:row.active };
  },
  _toOrder(row){
    return { id:row.id, orderNum:row.order_num, createdAt:new Date(row.created_at).getTime(),
             customer:{ username:row.customer_username, name:row.customer_name, phone:row.customer_phone, address:row.customer_address },
             items:row.items, paymentMethod:row.payment_method, totals:row.totals, status:row.status,
             source: row.source || 'app' };
  },

  // ---------- load all data ----------
  async loadAll(){
    const [catRes, itemRes, promoRes, orderRes, restRes] = await Promise.all([
      SB.from('categories').select('*').order('sort_order'),
      SB.from('menu_items').select('*'),
      SB.from('promotions').select('*'),
      SB.from('orders').select('*').order('created_at', { ascending:false }),
      SB.from('restaurant_settings').select('*').eq('id', 1).maybeSingle()
    ]);

    if(catRes.error) throw catRes.error;
    if(!catRes.data || catRes.data.length===0){ await DB.seed(); return DB.loadAll(); }

    const cats   = (catRes.data||[]).map(r=>({ id:r.id, name:r.name, image:r.image||null }));
    const items  = (itemRes.data||[]).map(DB._toItem);
    const promos = (promoRes.data||[]).map(DB._toPromo);
    const orders = (orderRes.data||[]).map(DB._toOrder);
    let rest = DEFAULT_RESTAURANT;
    if(restRes.data){
      const r = restRes.data;
      rest = { id:1, name:r.name, tagline:r.tagline, cover_image:r.cover_image||null, logo_image:r.logo_image||null, groq_key:r.groq_key||null,
               loyalty: r.loyalty || DEFAULT_RESTAURANT.loyalty };
    }
    return { cats, items, promos, orders, rest };
  },

  // ---------- seed default data (first run) ----------
  async seed(){
    await SB.from('restaurant_settings').upsert([{ id:1, name:DEFAULT_RESTAURANT.name, tagline:DEFAULT_RESTAURANT.tagline, cover_image:null, logo_image:null, loyalty:DEFAULT_RESTAURANT.loyalty }]);
    await SB.from('categories').upsert(DEFAULT_CATEGORIES.map(c=>({ id:c.id, name:c.name, sort_order:c.sort_order, image:null })));
    await SB.from('menu_items').upsert(DEFAULT_ITEMS.map(i=>({ id:i.id, category_id:i.category_id, category_ids:[i.category_id], name:i.name, description:i.description, price:i.price, emoji:i.emoji, image:null, available:i.available })));
    await SB.from('promotions').upsert(DEFAULT_PROMOS.map(p=>({ id:p.id, title:p.title, description:p.description, image:null, type:p.type, scope:p.scope||null, category_id:p.category_id||null, percent:p.percent, code:p.code||null, combo_items:p.combo_items||null, combo_price:p.combo_price||0, active:p.active })));
  },

  // ---------- categories ----------
  async saveCategory(cat){
    const { error } = await SB.from('categories').upsert([{ id:cat.id, name:cat.name, sort_order: cat.sort_order ?? 0, image: cat.image||null }]);
    if(error) throw error;
  },
  async deleteCategory(id){
    const { error } = await SB.from('categories').delete().eq('id', id);
    if(error) throw error;
  },

  // ---------- menu items ----------
  async saveItem(item){
    const row = { id:item.id, category_ids:item.categoryIds, category_id:item.categoryIds[0]||null, name:item.name, description:item.desc||'', price:item.price, emoji:item.emoji, image:item.image||null, available:item.available };
    const { error } = await SB.from('menu_items').upsert([row]);
    if(error) throw error;
  },
  async deleteItem(id){
    const { error } = await SB.from('menu_items').delete().eq('id', id);
    if(error) throw error;
  },

  // ---------- promotions ----------
  async savePromo(promo){
    const row = { id:promo.id, title:promo.title, description:promo.desc||'', image:promo.image||null, type:promo.type, scope:promo.scope||null, category_id:promo.categoryId||null, percent:promo.percent||0, code:promo.code||null, combo_items:promo.comboItems||null, combo_price:promo.comboPrice||0, active:promo.active };
    const { error } = await SB.from('promotions').upsert([row]);
    if(error) throw error;
  },
  async deletePromo(id){
    const { error } = await SB.from('promotions').delete().eq('id', id);
    if(error) throw error;
  },

  // ---------- restaurant settings ----------
  async saveRestaurant(data){
    const { error } = await SB.from('restaurant_settings').upsert([{ id:1, name:data.name, tagline:data.tagline, cover_image:data.cover_image||null, logo_image:data.logo_image||null, groq_key:data.groq_key||null, loyalty:App.state.loyalty }]);
    if(error) throw error;
  },
  async saveLoyalty(loyalty){
    const r = App.state.restaurant;
    const { error } = await SB.from('restaurant_settings').upsert([{ id:1, name:r.name, tagline:r.tagline, cover_image:r.cover_image||null, logo_image:r.logo_image||null, loyalty }]);
    if(error) throw error;
  },

  // ---------- customers ----------
  async register(username, password, name, phone, address){
    const { data:existing } = await SB.from('customers').select('id').ilike('username', username).maybeSingle();
    if(existing) return { error:'Потребителското име вече съществува.' };
    const { data, error } = await SB.from('customers').insert([{ username, password, name, phone, address, points:0 }]).select().single();
    return { data, error:error ? error.message : null };
  },
  async login(username, password){
    const { data, error } = await SB.from('customers').select('*').ilike('username', username).eq('password', password).maybeSingle();
    if(error) return { data:null, error:error.message };
    if(!data) return { data:null, error:'Грешно потребителско име или парола.' };
    return { data, error:null };
  },
  async updatePoints(username, points){
    await SB.from('customers').update({ points }).ilike('username', username);
  },

  // ---------- orders ----------
  async saveOrder(order){
    const row = { id:order.id, order_num:order.orderNum, customer_username:order.customer.username||null,
      customer_name:order.customer.name, customer_phone:order.customer.phone, customer_address:order.customer.address,
      items:order.items, payment_method:order.paymentMethod, totals:order.totals, status:order.status };
    const { error } = await SB.from('orders').insert([row]);
    if(error) throw error;
  },
  async updateOrderStatus(id, status){
    const { error } = await SB.from('orders').update({ status }).eq('id', id);
    if(error) throw error;
  },

  // ---------- realtime ----------
  subscribeOrders(callback){
    const channel = SB.channel('orders-realtime')
      .on('postgres_changes', { event:'*', schema:'public', table:'orders' }, async () => {
        const { data } = await SB.from('orders').select('*').order('created_at',{ascending:false});
        if(data) callback(data.map(DB._toOrder));
      })
      .subscribe();
    return channel;
  }
};

let _realtimeChannel = null;

async function init(){
  render();
  const cfg = loadConfig();
  if(!cfg){ setState({ screen:'setup', initLoading:false }); return; }

  try{
    initSupabase(cfg.url, cfg.key);
    const { cats, items, promos, orders, rest } = await DB.loadAll();

    App.state.categories = cats;
    App.state.items = items;
    App.state.promos = promos;
    App.state.orders = orders;
    App.state.restaurant = rest;
    App.state.loyalty = rest.loyalty || DEFAULT_RESTAURANT.loyalty;
    App.state.cart = cartGet();

    const session = sessionGet();
    if(session && session.username){
      const { data } = await SB.from('customers').select('*').ilike('username', session.username).maybeSingle();
      if(data) App.state.profile = { username:data.username, name:data.name, phone:data.phone, address:data.address, points:data.points };
    }

    // Realtime subscription — replaces polling completely
    if(_realtimeChannel) SB.removeChannel(_realtimeChannel);
    _realtimeChannel = DB.subscribeOrders(orders => {
      App.state.orders = orders;
      const s = App.state.screen;
      if(s==='cust-track' || App.state.restUnlocked) render();
    });

    // Restore admin session if previously logged in
    const { data:{ session:authSession } } = await SB.auth.getSession();
    if(authSession) { App.state.restUnlocked = true; }

    setState({ screen:'role', initLoading:false, setupLoading:false });
  }catch(e){
    console.error(e);
    setState({ screen:'setup', setupError:'Грешка при свързване: ' + (e.message||e), initLoading:false, setupLoading:false });
  }
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function categoryName(id){ const c = App.state.categories.find(c=>c.id===id); return c ? c.name : ''; }
function itemById(id){ return App.state.items.find(i=>i.id===id); }
function thumbHtml(item){ return item.image ? `<img src="${item.image}" alt="">` : (item.emoji || '🍽️'); }

function effectivePrice(item){
  let price = item.price;
  App.state.promos.filter(p=>p.active && p.type==='auto' && p.scope==='category' && (item.categoryIds||[]).includes(p.categoryId)).forEach(p=>{
    price = price * (1 - p.percent/100);
  });
  return price;
}
function tierFor(points){
  const tiers = (App.state.loyalty.tiers||[]).slice().sort((a,b)=>a.minPoints-b.minPoints);
  let cur = tiers[0] || {name:'Бронз',minPoints:0,percent:0};
  tiers.forEach(t=>{ if(points >= t.minPoints) cur = t; });
  return cur;
}
function cartLines(){
  return App.state.cart.map(c=>{
    if(c.itemId){
      const item = itemById(c.itemId); if(!item) return null;
      return { ...c, kind:'item', name:item.name, unitPrice:effectivePrice(item) };
    }
    if(c.comboId){
      const combo = App.state.promos.find(p=>p.id===c.comboId && p.type==='combo' && p.active); if(!combo) return null;
      return { ...c, kind:'combo', name:combo.title, unitPrice:combo.comboPrice };
    }
    return null;
  }).filter(Boolean);
}
function cartTotals(){
  const lines = cartLines();
  const subtotal = lines.reduce((s,l)=>s + l.unitPrice*l.qty, 0);
  let discountPct = 0;
  App.state.promos.filter(p=>p.active && p.type==='auto' && p.scope==='order').forEach(p=>discountPct += p.percent);
  if(App.state.promoCodeApplied) discountPct += App.state.promoCodeApplied.percent;
  const tier = App.state.profile ? tierFor(App.state.profile.points||0) : null;
  if(tier) discountPct += tier.percent;
  const discount = subtotal * (discountPct/100);
  const deliveryFee = App.state.loyalty.deliveryFee||1.30;
  const total = Math.max(0, subtotal - discount) + deliveryFee;
  const pointsEarned = Math.floor(Math.max(0,subtotal-discount) * (App.state.loyalty.pointsPerLev||1));
  return { subtotal, discount, discountPct, deliveryFee, total, pointsEarned, tier };
}

/* ============================= NEW-ORDER ALARM ============================= */
let _audioCtx = null;
let _alarmTimer = null;
let _alarmOn = false;

function ensureAudioCtx(){
  try{
    if(!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(_audioCtx.state === 'suspended') _audioCtx.resume();
  }catch(e){ /* audio unsupported, ignore */ }
  return _audioCtx;
}
function playAlarmBeep(){
  const ctx = _audioCtx;
  if(!ctx) return;
  const now = ctx.currentTime;
  [ [880, now], [1100, now+0.4] ].forEach(([freq, t])=>{
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.35, t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.35);
    osc.start(t); osc.stop(t+0.36);
  });
}
function startAlarm(){
  if(_alarmOn) return;
  _alarmOn = true;
  ensureAudioCtx();
  playAlarmBeep();
  _alarmTimer = setInterval(playAlarmBeep, 1700);
}
function stopAlarm(){
  if(!_alarmOn) return;
  _alarmOn = false;
  clearInterval(_alarmTimer);
  _alarmTimer = null;
}
function pendingOrdersCount(){
  return App.state.orders.filter(o=>o.status==='pending').length;
}
function checkAlarm(){
  if(!App.state.restUnlocked){ stopAlarm(); return; }
  if(pendingOrdersCount() > 0) startAlarm(); else stopAlarm();
}
function alarmBanner(){
  if(!_alarmOn || App.state.screen==='rest-orders') return '';
  const n = pendingOrdersCount();
  return `<button onclick="App.goRestTab('orders')" style="position:sticky;top:0;z-index:8;width:100%;background:var(--red);color:#fff;border:none;padding:11px 14px;font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:8px;">
    🔔 ${n} ${n===1?'нова поръчка':'нови поръчки'} — натисни за преглед
  </button>`;
}

};

const SQL_SCRIPT = `-- ================================================================
-- ОГНИЩЕ — Пълен SQL setup скрипт
-- Изпълни в Supabase → SQL Editor → New query → Run
-- Безопасен за повторно изпълнение (idempotent)

-- ----------------------------------------------------------------
-- 1. ТАБЛИЦИ
-- ----------------------------------------------------------------

create table if not exists restaurant_settings (
  id           integer primary key default 1,
  name         text    default 'Огнище',
  tagline      text    default 'Скара и домашна кухня',
  cover_image  text,

);
insert into restaurant_settings (id) values (1) on conflict do nothing;

-- Нови колони (безопасно при повторно изпълнение)
alter table restaurant_settings add column if not exists logo_image  text;
alter table restaurant_settings add column if not exists groq_key    text;

-- ----------------------------------------------------------------

create table if not exists categories (
  id         text    primary key,
  name       text    not null,
  sort_order integer default 0,
  image      text
);
alter table categories add column if not exists image text;

-- ----------------------------------------------------------------

create table if not exists menu_items (
  id           text           primary key,
  category_id  text,
  category_ids text[],
  name         text           not null,

);
alter table menu_items add column if not exists category_ids text[];
-- Прехвърля съществуващите category_id → category_ids масив
update menu_items
  set category_ids = array[category_id]
  where category_ids is null and category_id is not null;

-- ----------------------------------------------------------------

create table if not exists promotions (

);

-- ----------------------------------------------------------------

create table if not exists customers (
  id         uuid        primary key default gen_random_uuid(),
  username   text        unique not null,
  password   text        not null,
  name       text        not null,
  phone      text        not null,
  address    text        not null,

);

-- ----------------------------------------------------------------

create table if not exists orders (
  id               text        primary key,

);

alter table orders add column if not exists viber_id text;

-- ----------------------------------------------------------------

create table if not exists viber_sessions (
  viber_id   text        primary key,
  step       text        default 'idle',

  name       text,

  address    text,

);

-- ----------------------------------------------------------------
-- 2. VIBER НОМЕРАЦИЯ НА ПОРЪЧКИ
-- ----------------------------------------------------------------

create sequence if not exists viber_order_seq start 1;

create or replace function next_viber_order_num()
returns text
language sql
as $$
  select 'ОГ-V' || lpad(nextval('viber_order_seq')::text, 4, '0');
$$;

-- ----------------------------------------------------------------
-- 3. ROW LEVEL SECURITY
-- ----------------------------------------------------------------

alter table restaurant_settings enable row level security;
alter table categories          enable row level security;
alter table menu_items          enable row level security;
alter table promotions          enable row level security;
alter table customers           enable row level security;
alter table orders              enable row level security;
alter table viber_sessions      enable row level security;

-- Изчисти старите "allow all" политики преди да сложим новите
do $$ begin
  -- restaurant_settings
  drop policy if exists "allow all"  on restaurant_settings;
  drop policy if exists "anon read"  on restaurant_settings;
  drop policy if exists "auth write" on restaurant_settings;
  -- categories
  drop policy if exists "allow all"  on categories;
  drop policy if exists "anon read"  on categories;
  drop policy if exists "auth write" on categories;

  drop policy if exists "auth write" on promotions;
  -- customers

  drop policy if exists "anon insert"     on customers;
  drop policy if exists "anon read own"   on customers;
  drop policy if exists "anon update own" on customers;
  drop policy if exists "auth all"        on customers;
  -- orders
  drop policy if exists "allow all"     on orders;
  drop policy if exists "anon insert"   on orders;
  drop policy if exists "anon read own" on orders;
  drop policy if exists "auth all"      on orders;
  -- viber_sessions
  drop policy if exists "allow all"    on viber_sessions;
  drop policy if exists "service only" on viber_sessions;
end $$;

-- restaurant_settings: анон чете, само auth пише
create policy "anon read"  on restaurant_settings for select using (true);
create policy "auth write" on restaurant_settings for all
  using (auth.role() = 'authenticated')
  with check (auth.role() = 'authenticated');

-- categories: анон чете, само auth пише
create policy "anon read"  on categories for select using (true);
create policy "auth write" on categories for all
  using (auth.role() = 'authenticated')
  with check (auth.role() = 'authenticated');

-- menu_items: анон вижда само available=true, auth вижда/пише всичко
create policy "anon read"  on menu_items for select
  using (available = true or auth.role() = 'authenticated');
create policy "auth write" on menu_items for all
  using (auth.role() = 'authenticated')
  with check (auth.role() = 'authenticated');

-- promotions: анон вижда само active=true, auth вижда/пише всичко

  using (auth.role() = 'authenticated')
  with check (auth.role() = 'authenticated');

-- customers: анон може да се регистрира и чете/ъпдейтва
create policy "anon insert"     on customers for insert with check (true);
create policy "anon read own"   on customers for select using (true);
create policy "anon update own" on customers for update using (true) with check (true);
create policy "auth all"        on customers for all

  with check (auth.role() = 'authenticated');

-- orders: анон вмъква нови и чете; auth управлява всичко

create policy "anon read own" on orders for select using (true);
create policy "auth all"      on orders for all
  using (auth.role() = 'authenticated')
  with check (auth.role() = 'authenticated');

-- viber_sessions: само service_role (Edge Function)
create policy "service only" on viber_sessions for all
  using (auth.role() = 'service_role')
  with check (auth.role() = 'service_role');

/* ---------- category thumbnail: own photo first, else derived from a dish in it ---------- */
function categoryThumb(catId){
  const cat = App.state.categories.find(c=>c.id===catId);
  if(cat && cat.image) return `<img src="${cat.image}" alt="">`;
  const itemsInCat = App.state.items.filter(i=>(i.categoryIds||[]).includes(catId));
  const withImg = itemsInCat.find(i=>i.image);
  if(withImg) return `<img src="${withImg.image}" alt="">`;
  const first = itemsInCat[0];
  return first ? (first.emoji||'🍽️') : '🍽️';
}

App.placeOrder = async function(){
  const isGuest = App.state.guestMode && !App.state.profile;
  let custName, custPhone, custUsername;
  if(isGuest){
    custName = (document.getElementById('guest-name')?.value||'').trim();
    custPhone = (document.getElementById('guest-phone')?.value||'').trim();
    if(!custName||!custPhone){ toast('Въведи име и телефон'); return; }
    custUsername = null;
  } else {
    custName = App.state.profile.name;
    custPhone = App.state.profile.phone;
    custUsername = App.state.profile.username;
  }
  if(!App.state.addressEdit||App.state.addressEdit.trim().length<3){ toast('Въведи адрес за доставка'); return; }
  if(App.state.paymentMethod==='online'){
    const { cardNum, cardExp, cardCvc } = App.state;
    if(cardNum.replace(/\s/g,'').length<16||cardExp.length<4||cardCvc.length<3){ toast('Въведи валидни данни на картата'); return; }
    setState({ payProcessing:true }); await new Promise(r=>setTimeout(r,1100));
  }
  const t = cartTotals(); const lines = cartLines();
  const orderNum = 'ОГ-' + String(App.state.orders.length+1).padStart(4,'0');
  const order = {
    id:uid(), orderNum, createdAt:Date.now(),
    customer:{ username:custUsername, name:custName, phone:custPhone, address:App.state.addressEdit },
    items:lines.map(l=>({ name:l.name, qty:l.qty, price:l.unitPrice })),
    paymentMethod:App.state.paymentMethod, totals:t, status:'pending', source:'app'
  };
  try{
    await DB.saveOrder(order);
    if(!isGuest && App.state.profile){
      await DB.updatePoints(custUsername, (App.state.profile.points||0) + t.pointsEarned);
      App.state.profile = { ...App.state.profile, points:(App.state.profile.points||0) + t.pointsEarned };

  try{ await navigator.clipboard.writeText(text); toast('Поръчката е копирана в клипборда'); }

App.saveCategory = async function(){
  const c = App.state.editingCategory;
  const name = document.getElementById('cat-name').value.trim();
  if(!name){ toast('Въведи име на категорията'); return; }
  const newId = c.id || uid();
  const sortOrder = c.id ? App.state.categories.findIndex(x=>x.id===c.id) : App.state.categories.length;
  const image = App._pendingCategoryImage || null;
  try{
    await DB.saveCategory({ id:newId, name, sort_order: sortOrder, image });
    let cats = App.state.categories;
    if(c.id) cats = cats.map(x=>x.id===c.id ? { id:c.id, name, image } : x);
    else cats = [...cats, { id:newId, name, image }];
    App.state.categories = cats;
    setState({ editingCategory:null, showCategoryModal:false });
    toast('Категорията е запазена');
  }catch(e){ toast('Грешка: '+e.message); }
};
App.deleteCategory = async function(id){
  const itemsInCat = App.state.items.filter(i=>(i.categoryIds||[]).includes(id));
  const wouldOrphan = itemsInCat.filter(i=>(i.categoryIds||[]).length<=1);
  if(wouldOrphan.length>0){
    toast(`„${wouldOrphan[0].name}" остава без категория — добави му друга категория първо`);
    return;
  }
  try{
    for(const it of itemsInCat){
      const updated = { ...it, categoryIds: it.categoryIds.filter(c=>c!==id) };
      await DB.saveItem(updated);
      App.state.items = App.state.items.map(x=>x.id===it.id ? updated : x);
    }
    await DB.deleteCategory(id);
    App.state.categories = App.state.categories.filter(c=>c.id!==id);
    render(); toast('Категорията е изтрита');
  }catch(e){ toast('Грешка: '+e.message); }
};

  App._pendingImage = item.image || null;

function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>=h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } }
        else { if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } }
        const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror=()=>reject(new Error('bad image'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('read failed'));
    reader.readAsDataURL(file);
  });
}
function photoPreviewHtml(src, removeHandler){
  removeHandler = removeHandler || 'App.removePhoto()';
  return src
    ? `<div class="row gap8" style="align-items:center;"><img src="${src}" style="width:64px;height:64px;object-fit:cover;border-radius:10px;border:1px solid var(--border);">
         <button class="btn btn-ghost btn-sm" onclick="${removeHandler}">Премахни</button></div>`

}

  try{ const d = await resizeImageFile(file, 480, 0.72); App._pendingImage = d; const prev=document.getElementById('photo-preview'); if(prev) prev.innerHTML=photoPreviewHtml(d,'App.removePhoto()'); }

/* ============================= AI ASSISTANT ============================= */
App.state.aiOpen = false;
App.state.aiMessages = []; // { role:'bot'|'user', text, typing? }

function aiSendIcon(){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7Z"/></svg>`; }
function aiBotIcon(){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="9" cy="16" r="1.3"/><circle cx="15" cy="16" r="1.3"/></svg>`; }

function aiFloatingBtn(){
  const hasKey = !!(App.state.restaurant.groq_key||'').trim();
  if(!hasKey || App.state.aiOpen) return '';
  const screens = ['cust-menu','cust-category','cust-cart','cust-dish'];
  if(!screens.includes(App.state.screen)) return '';
  return `<button class="ai-fab" onclick="App.openAI()" title="AI Асистент">${aiBotIcon()}</button>`;
}

function micIcon(){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`; }
function aiPanel(){
  if(!App.state.aiOpen) return '';
  const msgs = App.state.aiMessages;
  const hasCheckout = App.state.aiReadyToCheckout;
  const hasMic = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  return `<div class="ai-panel">
    <div class="ai-header">
      <div class="ai-avatar">${aiBotIcon()}</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:14px;">AI Асистент</div>
        <div class="muted" style="font-size:11.5px;">Говори или пиши на български</div>
      </div>
      <button class="icon-btn" onclick="App.closeAI()">${icon('x',18)}</button>
    </div>
    <div class="ai-messages" id="ai-msgs">
      ${msgs.length===0 ? `<div class="ai-msg bot">👋 Здравей! Кажи ми какво искаш да поръчаш и ще те помогна. Мога да добавям ястия в количката, да отговарям на въпроси за менюто и да приема цялата ти поръчка!</div>` :
        msgs.map(m=>`<div class="ai-msg ${m.role}${m.typing?' typing':''}">${m.text.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>')}</div>`).join('')}
      ${hasCheckout ? `<button class="ai-checkout-btn" onclick="App.aiProceedToCheckout()">✅ Продължи към оформяне на поръчката</button>` : ''}
    </div>
    <div class="ai-input-row">
      ${hasMic ? `<button class="ai-mic" id="ai-mic-btn" onclick="App.aiToggleMic()" title="Говори">${micIcon()}</button>` : ''}
      <input id="ai-input" placeholder="${hasMic ? 'Напиши или говори…' : 'Напиши въпрос…'}" onkeydown="if(event.key==='Enter') App.aiSend()">
      <button class="ai-send" onclick="App.aiSend()">${aiSendIcon()}</button>
    </div>
  </div>`;
}

App.openAI = function(){
  App.state.aiOpen = true;
  App.state.aiReadyToCheckout = false;
  render();
  setTimeout(()=>{ const el=document.getElementById('ai-input'); if(el) el.focus(); },100);
};
App.closeAI = function(){ App.state.aiOpen = false; App.state.aiReadyToCheckout = false; render(); };

/* ---- Voice input ---- */
let _aiRecognition = null;
App.aiToggleMic = function(){
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRec){ toast('Гласовият вход не се поддържа в този браузър'); return; }
  if(_aiRecognition){
    _aiRecognition.stop(); _aiRecognition = null;
    const btn = document.getElementById('ai-mic-btn');
    if(btn) btn.classList.remove('listening');
    return;
  }
  _aiRecognition = new SpeechRec();
  _aiRecognition.lang = 'bg-BG';
  _aiRecognition.continuous = false;
  _aiRecognition.interimResults = false;
  const btn = document.getElementById('ai-mic-btn');
  if(btn) btn.classList.add('listening');
  _aiRecognition.onresult = (e)=>{
    const transcript = e.results[0][0].transcript;
    const input = document.getElementById('ai-input');
    if(input){ input.value = transcript; }
    _aiRecognition = null;
    if(btn) btn.classList.remove('listening');
    App.state.aiLastWasVoice = true;
    App.aiSend();
  };
  _aiRecognition.onerror = ()=>{
    _aiRecognition = null;
    if(btn) btn.classList.remove('listening');
    toast('Не разпознах — опитай отново');
  };
  _aiRecognition.onend = ()=>{
    _aiRecognition = null;
    if(btn) btn.classList.remove('listening');
  };
  _aiRecognition.start();
};

/* ---- TTS — speak bot replies ---- */
App.aiSpeak = function(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  let clean = text
    .replace(/<[^>]+>/g, '')
    .replace(/\*\*/g, '')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FEFF}]/gu, '')
    .replace(/[✅✓☑❌❎⭐🔔📦👤📍📞🎉🙏]/g, '')
    .replace(/\n+/g, '. ')
    .replace(/\.{2,}/g, '.')
    .trim();
  if(!clean) return;
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = 'bg-BG'; utt.rate = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const bg = voices.find(v=>v.lang.startsWith('bg'));
  if(bg) utt.voice = bg;
  window.speechSynthesis.speak(utt);
};

/* ---- Checkout from AI ---- */
App.aiProceedToCheckout = function(){
  App.state.aiReadyToCheckout = false;
  App.closeAI();
  App.goCustTab('cart');
};

App.aiSend = async function(){
  const input = document.getElementById('ai-input');
  const text = (input?.value||'').trim();
  if(!text) return;
  input.value = '';
  if(!App.state.aiLastWasVoice) App.state.aiLastWasVoice = false;
  App.state.aiMessages.push({ role:'user', text });
  App.state.aiMessages.push({ role:'bot', text:'…', typing:true });
  renderAI();

  const groqKey = App.state.restaurant.groq_key||'';
  if(!groqKey){ App.state.aiMessages.pop(); App.state.aiMessages.push({ role:'bot', text:'AI асистентът не е конфигуриран. Моля свържете се с ресторанта.' }); renderAI(); return; }

  // Build menu context
  const menuCtx = App.state.categories.map(cat=>{
    const items = App.state.items.filter(i=>i.available && (i.categoryIds||[]).includes(cat.id));
    if(!items.length) return '';
    return cat.name + ':\n' + items.map(i=>`  - ${i.name} (${lv(i.price)})${i.desc?' — '+i.desc:''}`).join('\n');
  }).filter(Boolean).join('\n\n');

  const cartCtx = cartLines().length>0
    ? '\nКОЛИЧКА: ' + cartLines().map(l=>`${l.qty}× ${l.name} (${lv(l.unitPrice)})`).join(', ')
      + `\nОбща сума: ${lv(cartTotals().total)}`
    : '\nКОЛИЧКА: празна';

  const systemPrompt = `Ти си гласов AI асистент на ресторант "${App.state.restaurant.name}". Говориш САМО на български. Отговаряй КРАТКО — 1-2 изречения максимум.

МЕНЮ:
${menuCtx}
${cartCtx}

ПРАВИЛА — ЗАДЪЛЖИТЕЛНИ:
1. Добавяне на ястие: когато клиентът поиска конкретно ястие, добави го и отговори с: Добавено! \nACTION:{"action":"add","itemName":"ТОЧНОТО_ИМЕ_ОТ_МЕНЮТО"}
2. Избор между ястия: изброй ги само с текст, попитай кое да добавиш. НЕ пускай ACTION докато не е уточнено.
3. Финализиране: когато клиентът каже "поръчвам", "готово", "завърши поръчката" или подобно — ако количката НЕ е празна, отговори: Добре, ще оформим поръчката! \nACTION:{"action":"checkout"}
4. Ако количката е празна и клиентът иска да поръча — помоли го да добави ястия първо.
5. JSON командите (ACTION:...) НИКОГА не се показват на клиента — само ти ги виждаш.
6. НЕ показвай JSON в отговора, само обикновен текст + ACTION на отделен ред накрая.`;

  const history = App.state.aiMessages.filter(m=>!m.typing).slice(-12).map(m=>({
    role: m.role==='user' ? 'user' : 'assistant',
    content: m.text.replace(/<[^>]+>/g,'')
  }));

  try{
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{ 'Authorization':'Bearer '+groqKey, 'Content-Type':'application/json' },
      body: JSON.stringify({ model:'llama-3.3-70b-versatile', max_tokens:250,
        messages:[ {role:'system',content:systemPrompt}, ...history ] })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error?.message||'Groq грешка');
    let reply = data.choices?.[0]?.message?.content || 'Не можах да отговоря.';

    // ---- Parse ACTION commands ----
    // Add to cart
    const addMatch = reply.match(/ACTION:\s*\{[^}]*"action"\s*:\s*"add"[^}]*"itemName"\s*:\s*"([^"]+)"[^}]*\}/i);
    if(addMatch){
      reply = reply.replace(/ACTION:\s*\{[^}]+\}/gi, '').trim();
      const itemName = addMatch[1].toLowerCase();
      const found = App.state.items.find(i=>i.name.toLowerCase().includes(itemName) && i.available);
      if(found){
        App.changeQty(found.id, 1);
        const cartCount = cartLines().reduce((s,l)=>s+l.qty,0);
        if(!reply) reply = `✅ **${found.name}** е добавено! (${cartCount} артикула в количката)`;
        else reply += `\n✅ **${found.name}** е добавено!`;
      } else {
        if(!reply) reply = `Съжалявам, "${addMatch[1]}" не е налично в момента.`;
      }
    }

    // Checkout
    const checkoutMatch = reply.match(/ACTION:\s*\{[^}]*"action"\s*:\s*"checkout"[^}]*\}/i);
    if(checkoutMatch){
      reply = reply.replace(/ACTION:\s*\{[^}]+\}/gi, '').trim();
      if(!reply) reply = '✅ Страхотно! Натисни бутона по-долу за да оформиш поръчката.';
      App.state.aiReadyToCheckout = true;
    }

    // Safety net — strip ALL remaining JSON-like blocks
    reply = reply.replace(/ACTION:\s*\{[^}]+\}/gi, '').trim();
    reply = reply.replace(/\{\s*"action"[^}]+\}/gi, '').trim();
    reply = reply.replace(/\n{3,}/g, '\n\n').trim();

    App.state.aiMessages.pop();
    App.state.aiMessages.push({ role:'bot', text: reply });
    if(App.state.aiLastWasVoice){ App.aiSpeak(reply); }
    App.state.aiLastWasVoice = false;
  }catch(e){
    App.state.aiMessages.pop();
    App.state.aiMessages.push({ role:'bot', text:'Грешка при свързване с AI. Провери интернет връзката.' });
  }
  renderAI();
};

function renderAI(){
  // Lightweight partial re-render — only the panel and fab, not the whole screen
  const fab = document.getElementById('ai-fab-slot');
  const panel = document.getElementById('ai-panel-slot');
  if(fab) fab.innerHTML = aiFloatingBtn();
  if(panel) panel.innerHTML = aiPanel();
  // Auto-scroll messages
  setTimeout(()=>{ const el=document.getElementById('ai-msgs'); if(el) el.scrollTop=el.scrollHeight; },50);
}
init();


</script>
