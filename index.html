<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Огнище — Доставка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F6F7;
  --surface:#FFFFFF;
  --surface-2:#F1F1F3;
  --surface-3:#E7E7EA;
  --border:#E6E6E9;
  --text:#1B1B1D;
  --text-dim:#79797F;
  --text-faint:#B7B7BC;
  --ember:#E2202C;
  --ember-dim:#B5151F;
  --ember-glow:#E2202C30;
  --gold:#C98A1F;
  --green:#2E9E4F;
  --red:#D92D20;
  --radius:14px;
  --radius-sm:9px;
  --font-display:'Inter', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'Inter', sans-serif;
  color-scheme:light;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;color:inherit;}
svg{stroke:currentColor;}
input,select,textarea{font-family:inherit;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--ember-glow);}
.ai-fab{position:fixed;right:16px;bottom:84px;z-index:60;width:54px;height:54px;border-radius:50%;background:var(--ember);color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(0,0,0,.25);cursor:pointer;}
.ai-fab:active{transform:scale(.94);}
.ai-panel{position:fixed;left:0;right:0;bottom:0;top:0;z-index:70;background:var(--bg);display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.ai-panel-head{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--ember);color:#fff;flex-shrink:0;}
.ai-panel-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.ai-bubble{max-width:82%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.45;white-space:pre-wrap;}
.ai-bubble.user{align-self:flex-end;background:var(--ember);color:#fff;border-bottom-right-radius:4px;}
.ai-bubble.bot{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.ai-bubble.typing{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text-faint);}
.ai-panel-foot{flex-shrink:0;display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:var(--surface);}
.ai-panel-foot input{flex:1;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:20px;padding:11px 16px;font-size:14px;font-family:inherit;}
.ai-panel-foot button{flex-shrink:0;width:42px;height:42px;border-radius:50%;background:var(--ember);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ai-panel-foot button:disabled{opacity:.5;}
.ai-mic-btn.listening{background:var(--ember-dim);animation:aiPulse 1.1s ease-in-out infinite;}
@keyframes aiPulse{0%{box-shadow:0 0 0 0 rgba(226,32,44,.5);}70%{box-shadow:0 0 0 10px rgba(226,32,44,0);}100%{box-shadow:0 0 0 0 rgba(226,32,44,0);}}
.ai-head-btn{background:none;border:none;color:#fff;cursor:pointer;padding:6px;display:flex;align-items:center;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px;}

#shell{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,0,.06);
}
#root{flex:1;padding-bottom:84px;}
.scr{animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(.93);}}
@media (prefers-reduced-motion: reduce){.scr{animation:none;}}

/* ---------- typography helpers ---------- */
h1,h2,h3{font-family:var(--font-display);font-weight:800;margin:0;letter-spacing:-.01em;}
.eyebrow{font-family:var(--font-body);font-weight:800;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ember);}
.muted{color:var(--text-dim);}
.mono{font-family:var(--font-body);}
.price{font-family:var(--font-body);font-weight:800;}

/* ---------- layout helpers ---------- */
.pad{padding:18px;}
.row{display:flex;align-items:center;}
.between{justify-content:space-between;}
.gap8{gap:8px;}
.gap12{gap:12px;}
.col{display:flex;flex-direction:column;}
.center-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

/* ---------- divider ---------- */
.ember-divider{
  height:2px;
  margin:22px 0 18px;
  background:linear-gradient(90deg, transparent, var(--ember) 18%, var(--gold) 50%, var(--ember) 82%, transparent);
  position:relative;
  opacity:.85;
  border-radius:2px;
}

/* ---------- buttons ---------- */
.btn{
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--text);
  border-radius:11px;
  padding:13px 18px;
  font-size:15px;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:transform .12s ease, opacity .12s ease;
  width:100%;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(180deg, var(--ember), var(--ember-dim));border:none;color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);}
.btn-sm{padding:8px 12px;font-size:13px;width:auto;border-radius:9px;}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn:disabled{opacity:.4;pointer-events:none;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text);
}

/* ---------- inputs ---------- */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:12.5px;color:var(--text-dim);}
.field input,.field select,.field textarea{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  padding:11px 13px;
  font-size:15px;
  outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ember);}
.field textarea{resize:vertical;min-height:64px;}

/* ---------- header / logo ---------- */
.logo-mark{
  width:46px;height:46px;border-radius:13px;
  background:radial-gradient(circle at 30% 25%, var(--gold), var(--ember) 60%, var(--ember-dim));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px -4px var(--ember-glow);
  color:#fff;overflow:hidden;
}
.logo-mark img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-name{font-family:var(--font-display);font-size:21px;font-weight:800;letter-spacing:-.01em;}
.topbar{
  position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg, var(--bg) 80%, transparent);
  padding:16px 18px 6px;
}

/* ---------- solid red app bar (customer screens) ---------- */
.redbar{
  position:sticky;top:0;z-index:6;
  background:linear-gradient(180deg, var(--ember), var(--ember-dim));
  color:#fff;padding:14px 14px;display:flex;align-items:center;gap:10px;
}
.bar-icon{
  width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;position:relative;
}
.bar-logo{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:#fff;overflow:hidden;}
.bar-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.bar-title{font-weight:800;font-size:16px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.cart-badge{
  position:absolute;top:-4px;right:-4px;background:#fff;color:var(--ember);font-size:10px;font-weight:800;
  min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;
}

/* ---------- cards ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
}
.banner{
  border-radius:var(--radius);
  padding:16px;
  background:linear-gradient(120deg, #FFEDEC, #FFF7F2);
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.banner::after{
  content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle, var(--ember-glow), transparent 70%);
}

/* ---------- category grid (home) ---------- */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:6px 18px 18px;}
.cat-tile{cursor:pointer;}
.cat-tile-img{
  width:100%;height:108px;border-radius:14px;overflow:hidden;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:34px;border:1px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.cat-tile-img img{width:100%;height:100%;object-fit:cover;display:block;}
.cat-tile-label{margin-top:8px;font-weight:800;font-size:12.5px;text-align:center;text-transform:uppercase;letter-spacing:.02em;color:var(--text);}
.cat-tile-desc{margin-top:4px;font-size:11.5px;line-height:1.35;text-align:center;color:var(--text-dim);}

/* ---------- category chips ---------- */
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:4px 18px 14px;scrollbar-width:none;}
.chiprow::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;padding:9px 15px;border-radius:20px;font-size:13.5px;font-weight:600;
  border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);white-space:nowrap;
}
.chip.active{background:var(--ember);color:#fff;border-color:var(--ember);}

/* ---------- promo carousel ---------- */
.promo-row{display:flex;gap:12px;overflow-x:auto;padding:2px 18px 6px;scrollbar-width:none;}
.promo-row::-webkit-scrollbar{display:none;}
.promo-card{
  flex:0 0 auto;width:210px;height:120px;border-radius:14px;overflow:hidden;position:relative;
  border:1px solid var(--border);cursor:pointer;background:linear-gradient(135deg,var(--ember),var(--ember-dim));
}
.promo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.promo-card .promo-fade{position:absolute;inset:0;background:linear-gradient(180deg, transparent 35%, rgba(10,7,5,.85));}
.promo-card .promo-text{position:absolute;bottom:9px;left:11px;right:11px;color:#fff;}

/* ---------- menu item ---------- */
.menu-item{
  display:flex;gap:12px;align-items:flex-start;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.menu-item:last-child{border-bottom:none;}
.item-emoji{
  width:58px;height:58px;border-radius:13px;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 58px;
  border:1px solid var(--border);overflow:hidden;
}
.item-emoji img{width:100%;height:100%;object-fit:cover;display:block;}
.item-name{font-weight:700;font-size:15px;}
.item-desc{font-size:12.5px;color:var(--text-dim);margin-top:2px;line-height:1.4;}
.strike{text-decoration:line-through;color:var(--text-faint);font-size:12.5px;margin-right:6px;}
.qty-stepper{display:flex;align-items:center;gap:10px;}
.qty-btn{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text);
}
.add-pill{
  border:1px solid var(--ember);color:var(--ember);background:#fff;border-radius:18px;
  padding:6px 14px;font-size:13px;font-weight:700;
}

/* ---------- bottom nav ---------- */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;padding:10px 6px 14px;z-index:10;
}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-faint);font-size:11px;font-weight:600;background:none;border:none;flex:1;padding:4px;}
.tab.active{color:var(--ember);}
.tab svg{stroke:currentColor;}

/* ---------- floating cart bar ---------- */
.cart-fab{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);width:calc(100% - 36px);max-width:444px;
  background:linear-gradient(180deg, var(--ember), var(--ember-dim));color:#fff;border-radius:14px;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;font-weight:700;z-index:9;
  box-shadow:0 8px 24px -6px var(--ember-glow);border:none;
}

/* ---------- product detail footer ---------- */
.detail-footer{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:#fff;border-top:1px solid var(--border);padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  display:flex;gap:10px;z-index:10;
}
.fav-btn{
  width:48px;height:48px;border-radius:12px;border:1px solid var(--border);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);flex:0 0 auto;
}
.fav-btn.active{background:var(--ember-glow);border-color:var(--ember);color:var(--ember);}

/* ---------- toast ---------- */
#toast{
  position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-30px);
  background:#1B1B1D;border:1px solid var(--border);color:#fff;
  padding:11px 18px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:50;
  opacity:0;transition:all .25s ease;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- order status stepper ---------- */
.stepper{display:flex;align-items:center;margin:24px 0;}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.step-dot{
  width:16px;height:16px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border);z-index:2;
}
.step.lit .step-dot{background:var(--ember);border-color:var(--ember);box-shadow:0 0 12px 2px var(--ember-glow);}
.step-line{position:absolute;top:7px;left:50%;width:100%;height:2px;background:var(--border);z-index:1;}
.step.lit .step-line{background:linear-gradient(90deg, var(--ember), var(--gold));}
.step:last-child .step-line{display:none;}
.step-label{font-size:10.5px;color:var(--text-faint);margin-top:8px;text-align:center;max-width:64px;}
.step.lit .step-label{color:var(--text);}

/* ---------- restaurant admin ---------- */
.admin-tabs{display:flex;gap:6px;padding:0 18px 14px;overflow-x:auto;}
.admin-tab{padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:13px;font-weight:600;white-space:nowrap;flex:0 0 auto;}
.admin-tab.active{background:#fff;color:var(--ember);border-color:var(--ember);}
.order-card{border-left:3px solid var(--ember);}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.02em;}
.badge.pending{background:#FFF1CC;color:#8A6D1B;}
.badge.preparing{background:#FDE7CC;color:#A35B00;}
.badge.delivering{background:#DCEBFF;color:#1D5FAE;}
.badge.delivered{background:#DEF5E1;color:#1F8A3D;}
.badge.cancelled{background:#FBE0DE;color:#C23A2E;}

/* ---------- modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(20,18,18,.5);z-index:30;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 18px 28px;
  animation:slideup .22s ease;box-shadow:0 -10px 30px rgba(0,0,0,.12);
}
@keyframes slideup{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px;}

.switchrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.switch{width:42px;height:24px;border-radius:14px;background:var(--surface-3);border:1px solid var(--border);position:relative;flex:0 0 auto;}
.switch.on{background:var(--ember);}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s ease;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.switch.on::after{left:21px;}

.role-card{
  width:100%;border:1px solid var(--border);background:var(--surface);border-radius:16px;
  padding:20px;display:flex;align-items:center;gap:14px;text-align:left;color:var(--text);
}
.role-card:active{transform:scale(.985);}

.empty-state{text-align:center;padding:50px 24px;color:var(--text-dim);}
</style>
</head>
<body>
<div id="shell">
  <div id="root"></div>
  <div id="ai-chat-slot"></div>
</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ============================= SUPABASE CLIENT ============================= */
// ── ЗА ВСЕКИ НОВ РЕСТОРАНТ (deploy на отделно копие на това приложение) ──
// Попълни тук URL и anon key от Supabase Dashboard > Settings > API на ТОЗИ
// клиент, преди да публикуваш файла. Ако оставиш и двете празни, приложението
// ще опита да вземе настройките от ?u=...&k=... в линка, а ако няма — ще
// покаже еднократен екран за ръчно въвеждане (запазва се в localStorage,
// само като резервен вариант за бързо тестване).
const EMBEDDED_SUPABASE_URL = '';   // напр. 'https://xxxxxxxx.supabase.co'
const EMBEDDED_SUPABASE_KEY = '';   // anon / public key (не service_role!)

const CFG_KEY = 'og_supabase_cfg';
let SB = null; // will be set after config

function loadConfig(){
  // 1) Вградена конфигурация — важи за всички устройства и браузъри на този деплой
  if(EMBEDDED_SUPABASE_URL && EMBEDDED_SUPABASE_KEY){
    return { url:EMBEDDED_SUPABASE_URL, key:EMBEDDED_SUPABASE_KEY };
  }
  // 2) Параметри в линка ?u=...&k=... — позволява един файл да служи на няколко клиента с различни линкове
  try{
    const params = new URLSearchParams(window.location.search);
    const u = params.get('u'); const k = params.get('k');
    if(u && k){
      const cfg = { url:decodeURIComponent(u), key:decodeURIComponent(k) };
      saveConfig(cfg.url, cfg.key); // кешира локално, за да не зависи от линка занапред
      return cfg;
    }
  }catch(e){}
  // 3) Резервен вариант — ръчно въведена конфигурация, запазена локално в този браузър
  try{ return JSON.parse(localStorage.getItem(CFG_KEY)); }catch(e){ return null; }
}
function saveConfig(url, key){
  localStorage.setItem(CFG_KEY, JSON.stringify({ url, key }));
}

function initSupabase(url, key){
  const { createClient } = window.supabase;
  SB = createClient(url, key, {
    realtime:{ params:{ eventsPerSecond:10 } }
  });
  return SB;
}

/* ============================= AI ASSISTANT (Groq) ============================= */
// ВНИМАНИЕ: AI заявките минават през Cloudflare Worker прокси (виж файла
// ognishte-ai-worker.js) — реалните API ключове се пазят там като Worker
// Secrets, НЕ тук в кода на сайта. Това е безопасно за публикуване на GitHub.
const EMBEDDED_WORKER_URL = 'https://weathered-silence-17f6.lenkov77.workers.dev/'; // Cloudflare Worker прокси за AI заявки
const WORKER_SHARED_SECRET = ''; // по избор — трябва да съвпада с APP_SECRET във Worker-а
const GROQ_MODEL = 'llama-3.3-70b-versatile';
const GROQ_FALLBACK_MODELS = ['llama-3.1-8b-instant'];
const OPENROUTER_MODELS = ['meta-llama/llama-3.3-70b-instruct:free', 'deepseek/deepseek-chat-v3.1:free', 'openrouter/free'];

/* ============================= ICONS ============================= */
function icon(name, size){
  size = size || 22;
  const s = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"`;

/* ============================= DATABASE LAYER ============================= */
const DB = {

  // ---------- helpers ----------
  _toItem(row){
    const ids = (row.category_ids && row.category_ids.length) ? row.category_ids : (row.category_id ? [row.category_id] : []);
    return { id:row.id, categoryIds:ids, name:row.name, desc:row.description||'',
             price:parseFloat(row.price), emoji:row.emoji||'🍽️', image:row.image||null, available:row.available };
  },
  _toPromo(row){
    return { id:row.id, title:row.title, desc:row.description||'', image:row.image||null,
             type:row.type, scope:row.scope||'order', categoryId:row.category_id||null,
             percent:parseFloat(row.percent)||0, code:row.code||null,
             comboItems:row.combo_items||null, comboPrice:parseFloat(row.combo_price)||0,
             active:row.active };
  },
  _toOrder(row){
    return { id:row.id, orderNum:row.order_num, createdAt:new Date(row.created_at).getTime(),
             customer:{ username:row.customer_username, name:row.customer_name, phone:row.customer_phone, address:row.customer_address },
             items:row.items, paymentMethod:row.payment_method, totals:row.totals, status:row.status,
             notes:row.notes||'', cutlery:!!row.cutlery,
             source: row.source || 'app' };
  },

  // ---------- load all data ----------
  async loadAll(){
    const [catRes, itemRes, promoRes, orderRes, restRes] = await Promise.all([
      SB.from('categories').select('*').order('sort_order'),
      SB.from('menu_items').select('*'),
      SB.from('promotions').select('*'),
      SB.from('orders').select('*').order('created_at', { ascending:false }),
      SB.from('restaurant_settings').select('*').eq('id', 1).maybeSingle()
    ]);

    if(catRes.error) throw catRes.error;
    if(!catRes.data || catRes.data.length===0){ await DB.seed(); return DB.loadAll(); }

    const cats   = (catRes.data||[]).map(r=>({ id:r.id, name:r.name, description:r.description||'', image:r.image||null }));
    const items  = (itemRes.data||[]).map(DB._toItem);
    const promos = (promoRes.data||[]).map(DB._toPromo);
    const orders = (orderRes.data||[]).map(DB._toOrder);
    let rest = DEFAULT_RESTAURANT;
    if(restRes.data){
      const r = restRes.data;
      rest = { id:1, name:r.name, tagline:r.tagline, contact_phone:r.contact_phone||'', cover_image:r.cover_image||null, logo_image:r.logo_image||null,
               payment_methods: (r.payment_methods && r.payment_methods.length) ? r.payment_methods : DEFAULT_RESTAURANT.payment_methods,
               loyalty: r.loyalty || DEFAULT_RESTAURANT.loyalty };
    }
    return { cats, items, promos, orders, rest };
  },

  // ---------- seed default data (first run) ----------
  async seed(){
    await SB.from('restaurant_settings').upsert([{ id:1, name:DEFAULT_RESTAURANT.name, tagline:DEFAULT_RESTAURANT.tagline, contact_phone:'', cover_image:null, logo_image:null, payment_methods:DEFAULT_RESTAURANT.payment_methods, loyalty:DEFAULT_RESTAURANT.loyalty }]);
    await SB.from('categories').upsert(DEFAULT_CATEGORIES.map(c=>({ id:c.id, name:c.name, description:c.description||'', sort_order:c.sort_order, image:null })));
    await SB.from('menu_items').upsert(DEFAULT_ITEMS.map(i=>({ id:i.id, category_id:i.category_id, category_ids:[i.category_id], name:i.name, description:i.description, price:i.price, emoji:i.emoji, image:null, available:i.available })));
    await SB.from('promotions').upsert(DEFAULT_PROMOS.map(p=>({ id:p.id, title:p.title, description:p.description, image:null, type:p.type, scope:p.scope||null, category_id:p.category_id||null, percent:p.percent, code:p.code||null, combo_items:p.combo_items||null, combo_price:p.combo_price||0, active:p.active })));
  },

  // ---------- categories ----------
  async saveCategory(cat){
    const { error } = await SB.from('categories').upsert([{ id:cat.id, name:cat.name, description:cat.description||'', sort_order: cat.sort_order ?? 0, image: cat.image||null }]);
    if(error) throw error;
  },
  async deleteCategory(id){
    const { error } = await SB.from('categories').delete().eq('id', id);
    if(error) throw error;
  },

  // ---------- menu items ----------
  async saveItem(item){
    const row = { id:item.id, category_ids:item.categoryIds, category_id:item.categoryIds[0]||null, name:item.name, description:item.desc||'', price:item.price, emoji:item.emoji, image:item.image||null, available:item.available };
    const { error } = await SB.from('menu_items').upsert([row]);
    if(error) throw error;
  },
  async deleteItem(id){
    const { error } = await SB.from('menu_items').delete().eq('id', id);
    if(error) throw error;
  },

  // ---------- promotions ----------
  async savePromo(promo){
    const row = { id:promo.id, title:promo.title, description:promo.desc||'', image:promo.image||null, type:promo.type, scope:promo.scope||null, category_id:promo.categoryId||null, percent:promo.percent||0, code:promo.code||null, combo_items:promo.comboItems||null, combo_price:promo.comboPrice||0, active:promo.active };
    const { error } = await SB.from('promotions').upsert([row]);
    if(error) throw error;
  },
  async deletePromo(id){
    const { error } = await SB.from('promotions').delete().eq('id', id);
    if(error) throw error;
  },

  // ---------- restaurant settings ----------
  async saveRestaurant(data){
    const { error } = await SB.from('restaurant_settings').upsert([{ id:1, name:data.name, tagline:data.tagline, contact_phone:data.contact_phone||'', cover_image:data.cover_image||null, logo_image:data.logo_image||null, payment_methods:data.payment_methods||App.state.restaurant.payment_methods, loyalty:App.state.loyalty }]);
    if(error) throw error;
  },
  async saveLoyalty(loyalty){
    const r = App.state.restaurant;
    const { error } = await SB.from('restaurant_settings').upsert([{ id:1, name:r.name, tagline:r.tagline, contact_phone:r.contact_phone||'', cover_image:r.cover_image||null, logo_image:r.logo_image||null, payment_methods:r.payment_methods, loyalty }]);
    if(error) throw error;
  },

  // ---------- customers ----------
  async register(username, password, name, phone, address){
    const { data:existing } = await SB.from('customers').select('id').ilike('username', username).maybeSingle();
    if(existing) return { error:'Потребителското име вече съществува.' };
    const { data, error } = await SB.from('customers').insert([{ username, password, name, phone, address, points:0 }]).select().single();
    return { data, error:error ? error.message : null };
  },
  async login(username, password){
    const { data, error } = await SB.from('customers').select('*').ilike('username', username).eq('password', password).maybeSingle();
    if(error) return { data:null, error:error.message };
    if(!data) return { data:null, error:'Грешно потребителско име или парола.' };
    return { data, error:null };
  },
  async updatePoints(username, points){
    await SB.from('customers').update({ points }).ilike('username', username);
  },

  // ---------- orders ----------
  async saveOrder(order){
    const row = { id:order.id, order_num:order.orderNum, customer_username:order.customer.username||null,
      customer_name:order.customer.name, customer_phone:order.customer.phone, customer_address:order.customer.address,
      items:order.items, payment_method:order.paymentMethod, totals:order.totals, status:order.status,
      notes:order.notes||'', cutlery:!!order.cutlery, source:order.source||'app' };
    const { error } = await SB.from('orders').insert([row]);
    if(error) throw error;
  },
  async updateOrderStatus(id, status){
    const { error } = await SB.from('orders').update({ status }).eq('id', id);
    if(error) throw error;
  },

  // ---------- realtime ----------
  subscribeOrders(callback){
    const channel = SB.channel('orders-realtime')
      .on('postgres_changes', { event:'*', schema:'public', table:'orders' }, async () => {
        const { data } = await SB.from('orders').select('*').order('created_at',{ascending:false});
        if(data) callback(data.map(DB._toOrder));
      })
      .subscribe();
    return channel;
  }
};

/* ============================= SESSION (localStorage) ============================= */
function sessionGet(){ try{ return JSON.parse(localStorage.getItem('og_session')); }catch(e){ return null; } }
function sessionSet(val){ localStorage.setItem('og_session', JSON.stringify(val)); }
function sessionClear(){ localStorage.removeItem('og_session'); }
function cartGet(){ try{ return JSON.parse(localStorage.getItem('og_cart'))||[]; }catch(e){ return []; } }
function cartSet(cart){ localStorage.setItem('og_cart', JSON.stringify(cart)); }

/* ============================= INIT ============================= */
let _realtimeChannel = null;

async function init(){
  render();
  const cfg = loadConfig();
  if(!cfg){ setState({ screen:'setup', initLoading:false }); return; }

  try{
    initSupabase(cfg.url, cfg.key);
    const { cats, items, promos, orders, rest } = await DB.loadAll();

    App.state.categories = cats;
    App.state.items = items;
    App.state.promos = promos;
    App.state.orders = orders;
    App.state.restaurant = rest;
    App.state.loyalty = rest.loyalty || DEFAULT_RESTAURANT.loyalty;
    App.state.cart = cartGet();

    const session = sessionGet();
    if(session && session.username){
      const { data } = await SB.from('customers').select('*').ilike('username', session.username).maybeSingle();
      if(data) App.state.profile = { username:data.username, name:data.name, phone:data.phone, address:data.address, points:data.points };
    }

    // Realtime subscription — replaces polling completely
    if(_realtimeChannel) SB.removeChannel(_realtimeChannel);
    _realtimeChannel = DB.subscribeOrders(orders => {
      App.state.orders = orders;
      const s = App.state.screen;
      if(s==='cust-track' || App.state.restUnlocked) render();
    });

    setState({ screen:'role', initLoading:false, setupLoading:false });
  }catch(e){
    console.error(e);
    setState({ screen:'setup', setupError:'Грешка при свързване: ' + (e.message||e), initLoading:false, setupLoading:false });
  }
}

}
function categoryName(id){ const c = App.state.categories.find(c=>c.id===id); return c ? c.name : ''; }
function itemById(id){ return App.state.items.find(i=>i.id===id); }
function thumbHtml(item){ return item.image ? `<img src="${item.image}" alt="">` : (item.emoji || '🍽️'); }

function effectivePrice(item){
  let price = item.price;
  App.state.promos.filter(p=>p.active && p.type==='auto' && p.scope==='category' && (item.categoryIds||[]).includes(p.categoryId)).forEach(p=>{
    price = price * (1 - p.percent/100);
  });
  return price;
}
function tierFor(points){
  const tiers = (App.state.loyalty.tiers||[]).slice().sort((a,b)=>a.minPoints-b.minPoints);
  let cur = tiers[0] || {name:'Бронз',minPoints:0,percent:0};
  tiers.forEach(t=>{ if(points >= t.minPoints) cur = t; });
  return cur;
}
function cartLines(){
  return App.state.cart.map(c=>{
    if(c.itemId){
      const item = itemById(c.itemId); if(!item) return null;
      return { ...c, kind:'item', name:item.name, unitPrice:effectivePrice(item) };
    }
    if(c.comboId){
      const combo = App.state.promos.find(p=>p.id===c.comboId && p.type==='combo' && p.active); if(!combo) return null;
      return { ...c, kind:'combo', name:combo.title, unitPrice:combo.comboPrice };
    }
    return null;
  }).filter(Boolean);
}
function cartTotals(){
  const lines = cartLines();
  const subtotal = lines.reduce((s,l)=>s + l.unitPrice*l.qty, 0);
  let discountPct = 0;
  App.state.promos.filter(p=>p.active && p.type==='auto' && p.scope==='order').forEach(p=>discountPct += p.percent);
  if(App.state.promoCodeApplied) discountPct += App.state.promoCodeApplied.percent;
  const tier = App.state.profile ? tierFor(App.state.profile.points||0) : null;
  if(tier) discountPct += tier.percent;
  const discount = subtotal * (discountPct/100);
  const deliveryFee = App.state.loyalty.deliveryFee||1.30;
  const total = Math.max(0, subtotal - discount) + deliveryFee;
  const pointsEarned = Math.floor(Math.max(0,subtotal-discount) * (App.state.loyalty.pointsPerLev||1));
  return { subtotal, discount, discountPct, deliveryFee, total, pointsEarned, tier };
}

/* ============================= NEW-ORDER ALARM ============================= */
let _audioCtx = null;
let _alarmTimer = null;
let _alarmOn = false;

function ensureAudioCtx(){
  try{
    if(!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(_audioCtx.state === 'suspended') _audioCtx.resume();
  }catch(e){ /* audio unsupported, ignore */ }
  return _audioCtx;
}
function playAlarmBeep(){
  const ctx = _audioCtx;
  if(!ctx) return;
  const now = ctx.currentTime;
  [ [880, now], [1100, now+0.4] ].forEach(([freq, t])=>{
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.35, t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.35);
    osc.start(t); osc.stop(t+0.36);
  });
}
function startAlarm(){
  if(_alarmOn) return;
  _alarmOn = true;
  ensureAudioCtx();
  playAlarmBeep();
  _alarmTimer = setInterval(playAlarmBeep, 1700);
}
function stopAlarm(){
  if(!_alarmOn) return;
  _alarmOn = false;
  clearInterval(_alarmTimer);
  _alarmTimer = null;
}
function pendingOrdersCount(){
  return App.state.orders.filter(o=>o.status==='pending').length;
}
function checkAlarm(){
  if(!App.state.restUnlocked){ stopAlarm(); return; }
  if(pendingOrdersCount() > 0) startAlarm(); else stopAlarm();
}
function alarmBanner(){
  if(!_alarmOn || App.state.screen==='rest-orders') return '';
  const n = pendingOrdersCount();
  return `<button onclick="App.goRestTab('orders')" style="position:sticky;top:0;z-index:8;width:100%;background:var(--red);color:#fff;border:none;padding:11px 14px;font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:8px;">
    🔔 ${n} ${n===1?'нова поръчка':'нови поръчки'} — натисни за преглед

}

  const username = document.getElementById('f-username').value.trim();
  const password = document.getElementById('f-password').value;
  if(!name||!phone||!addr||!username||!password){ toast('Попълни всички полета'); return; }
  if(password.length<4){ toast('Паролата трябва да е поне 4 символа'); return; }
  const { data, error } = await DB.register(username, password, name, phone, addr);
  if(error){ toast(error); return; }
  const profile = { username:data.username, name:data.name, phone:data.phone, address:data.address, points:0 };
  sessionSet({ username:profile.username });
  setState({ profile, screen:'cust-menu', custTab:'menu' });
  toast('Добре дошъл/а, ' + name + '!');
};
App.loginCustomer = async function(){
  const username = document.getElementById('f-username').value.trim();
  const password = document.getElementById('f-password').value;
  if(!username||!password){ toast('Въведи потребителско име и парола'); return; }
  const { data, error } = await DB.login(username, password);
  if(error){ toast(error); return; }
  const profile = { username:data.username, name:data.name, phone:data.phone, address:data.address, points:data.points };
  sessionSet({ username:profile.username });
  setState({ profile, screen:'cust-menu', custTab:'menu' });
  toast('Здравей, ' + data.name + '!');
};

function toGroqToolSchema(schema){
  if(!schema) return { type:'object', properties:{} };
  const out = { ...schema, type:(schema.type||'OBJECT').toLowerCase() };
  if(out.properties){
    out.properties = Object.fromEntries(Object.entries(out.properties).map(([k,v])=>[k, { ...v, type:(v.type||'STRING').toLowerCase() }]));
  } else out.properties = {};
  return out;
}

/* ---------- Voice: TTS (говорим отговор) ---------- */
let _bgVoice = null;
function pickBgVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('bg')) || null;
}
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = function(){ _bgVoice = pickBgVoice(); };
  _bgVoice = pickBgVoice();
}
function stripEmojiForSpeech(s){
  return (s||'')
    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{1F1E6}-\u{1F1FF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}\uFE0F\u200D]/gu, '')
    .replace(/\s{2,}/g, ' ').trim();
}
function speakBg(text){
  if(!App.state.aiVoiceEnabled || !text) return;
  if(!('speechSynthesis' in window)) return;
  const clean = stripEmojiForSpeech(text);
  if(!clean) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(clean);
  if(_bgVoice){ u.voice = _bgVoice; u.lang = _bgVoice.lang; } else { u.lang = 'bg-BG'; }
  u.rate = 1; u.pitch = 1;
  window.speechSynthesis.speak(u);
}
App.aiToggleVoice = function(){
  const next = !App.state.aiVoiceEnabled;
  if(!next) window.speechSynthesis && window.speechSynthesis.cancel();
  setState({ aiVoiceEnabled: next });
};

/* ---------- Voice: STT (диктовка) ---------- */
App._aiRecognition = null;
App.aiToggleMic = function(){
  if(App.state.aiListening){ App.aiStopListening(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast('Браузърът не поддържа гласово разпознаване. Пробвай с Chrome.'); return; }
  try{
    const rec = new SR();
    rec.lang = 'bg-BG';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onresult = function(e){
      const transcript = e.results[0][0].transcript;
      setState({ aiListening:false, aiInput:transcript, aiVoiceEnabled:true });
      App.aiSend();
    };
    rec.onerror = function(){ setState({ aiListening:false }); toast('Не успях да чуя добре — пробвай пак.'); };
    rec.onend = function(){ if(App.state.aiListening) setState({ aiListening:false }); };
    App._aiRecognition = rec;
    setState({ aiListening:true });
    rec.start();
  }catch(e){ setState({ aiListening:false }); toast('Грешка при достъп до микрофона: ' + e.message); }
};
App.aiStopListening = function(){
  if(App._aiRecognition){ try{ App._aiRecognition.stop(); }catch(e){} App._aiRecognition = null; }
  if(App.state.aiListening) setState({ aiListening:false });
};

/* ---------- tool implementations ---------- */
const AI_TOOL_IMPL = {
  search_menu({ query }){
    const norm = s=>(s||'').toLowerCase().trim();
    const wordMatch = (a,b)=>{
      if(!a||!b) return false;
      if(a.includes(b) || b.includes(a)) return true;
      const n = Math.min(a.length,b.length);
      return n>=4 && a.slice(0,4)===b.slice(0,4); // улавя форми като "кюфте"/"кюфтета", "айрян"/"айряна"
    };
    const qWords = norm(query).split(/[\s,]+/).filter(Boolean);
    const matches = App.state.items.filter(i=>{
      if(i.available===false) return false;
      if(!qWords.length) return true;
      const haystackWords = norm(i.name + ' ' + (i.desc||'') + ' ' + (i.categoryIds||[]).map(categoryName).join(' ')).split(/[\s,]+/).filter(Boolean);
      return qWords.some(qw=>haystackWords.some(hw=>wordMatch(hw,qw)));
    }).slice(0, 12);
    return { currency:'EUR', results: matches.map(i=>({ item_id:i.id, name:i.name, price_eur:i.price, desc:i.desc, category:(i.categoryIds||[]).map(categoryName).join(', ') })) };
  },
  list_categories(){
    return { categories: App.state.categories.map(c=>c.name) };
  },
  add_item_to_cart({ item_id, qty }){
    const item = itemById(item_id);
    if(!item) return { error:'Няма продукт с такъв item_id. Използвай search_menu първо.' };
    const n = Math.max(1, parseInt(qty)||1);
    const cart = App.state.cart; const line = cart.find(c=>c.itemId===item_id);
    if(line) line.qty += n; else cart.push({ itemId:item_id, qty:n });
    cartSet(cart); App.state.aiOrderSummaryShown=false; render();
    return { ok:true, cart:AI_TOOL_IMPL.get_cart() };
  },
  set_item_qty({ item_id, qty }){
    const n = Math.max(0, parseInt(qty)||0);
    let cart = App.state.cart;
    if(n<=0) cart = cart.filter(c=>c.itemId!==item_id);
    else { const line = cart.find(c=>c.itemId===item_id); if(line) line.qty = n; else cart.push({ itemId:item_id, qty:n }); }
    App.state.cart = cart; cartSet(cart); App.state.aiOrderSummaryShown=false; render();
    return { ok:true, cart:AI_TOOL_IMPL.get_cart() };
  },
  get_cart(){
    const lines = cartLines(); const t = cartTotals();
    return { currency:'EUR', items: lines.map(l=>({ item_id:l.itemId, name:l.name, qty:l.qty, unit_price_eur:l.unitPrice })), total_eur:t.total, subtotal_eur:t.subtotal };
  },
  set_guest_name({ name }){
    if(!name || !name.trim()) return { error:'Името е празно.' };
    App.state.guestName = name.trim(); App.state.aiOrderSummaryShown=false; render();
    return { ok:true, name:App.state.guestName };
  },
  set_guest_phone({ phone }){
    if(!phone || !phone.trim()) return { error:'Телефонът е празен.' };
    App.state.guestPhone = phone.trim(); App.state.aiOrderSummaryShown=false; render();
    return { ok:true, phone:App.state.guestPhone };
  },
  set_guest_address({ address }){
    if(!address || !address.trim()) return { error:'Адресът е празен.' };
    App.state.guestAddress = address.trim(); App.state.aiOrderSummaryShown=false; render();
    return { ok:true, address:App.state.guestAddress };
  },
  set_order_details({ notes, cutlery, payment_method }){
    if(typeof notes === 'string') App.state.orderNotes = notes;
    if(typeof cutlery === 'boolean') App.state.orderCutlery = cutlery;
    if(payment_method && ['cash','card_on_delivery'].includes(payment_method)) App.state.paymentMethod = payment_method;
    App.state.aiOrderSummaryShown=false;
    render();
    return { ok:true };
  },
  confirm_order_summary(){
    const lines = cartLines(); const t = cartTotals();
    if(!lines.length) return { error:'Количката е празна — добави продукти преди резюме.' };
    const isGuest = !App.state.profile;
    const custName = isGuest ? (App.state.guestName||'').trim() : App.state.profile.name;
    const custPhone = isGuest ? (App.state.guestPhone||'').trim() : App.state.profile.phone;

/* ---------- Groq API call loop (OpenAI-compatible chat completions) ---------- */
async function callProviderOnce(provider, model, messages){
  const headers = { 'Content-Type':'application/json' };
  if(WORKER_SHARED_SECRET) headers['X-App-Secret'] = WORKER_SHARED_SECRET;
  const res = await fetch(EMBEDDED_WORKER_URL, {
    method:'POST',
    headers,
    body:JSON.stringify({ provider:provider.id, model, messages, tools:GROQ_TOOLS, tool_choice:'auto', temperature:0.2 })
  });
  if(res.ok){
    const data = await res.json();
    const msg = data.choices && data.choices[0] && data.choices[0].message;
    if(!msg) throw { transient:false, message:'Празен отговор от AI.' };
    return msg;
  }
  const t = await res.text();
  if(res.status===429) throw { rateLimited:true, message:'Достигнат е безплатният лимит на ' + provider.name + '.' };
  if(res.status===503 || res.status===500 || res.status===529) throw { transient:true, message:'Моделът е временно претоварен.' };
  let parsedCode = '';
  try{ parsedCode = (JSON.parse(t).error||{}).code || ''; }catch(e){}
  if(parsedCode==='tool_use_failed') throw { transient:true, message:'Моделът не успя да форматира заявката коректно, ще пробвам пак.' };
  throw { transient:false, message:provider.name + ' API: ' + t.slice(0,200) };
}
function buildAiChain(){
  const chain = [];
  if(!EMBEDDED_WORKER_URL) return chain;
  const groqProvider = { name:'Groq', id:'groq' };
  chain.push({ provider:groqProvider, model:GROQ_MODEL });
  GROQ_FALLBACK_MODELS.forEach(m=>chain.push({ provider:groqProvider, model:m }));
  const orProvider = { name:'OpenRouter', id:'openrouter' };
  chain.push({ provider:orProvider, model:OPENROUTER_MODELS[0] });
  OPENROUTER_MODELS.slice(1).forEach(m=>chain.push({ provider:orProvider, model:m }));
  return chain;
}
async function callGroq(messages){
  const chain = buildAiChain();
  if(!chain.length) throw new Error('Няма зададен нито един AI ключ.');
  let lastMsg = 'AI доставчиците са временно недостъпни.';
  for(let i=0; i<chain.length; i++){
    const { provider, model } = chain[i];
    const isLast = (i === chain.length-1);
    if(!isLast){
      // не е последното звено във веригата — при rate limit просто преминаваме напред, без чакане
      for(let attempt=0; attempt<2; attempt++){
        try{ return await callProviderOnce(provider, model, messages); }
        catch(err){
          if(err && err.rateLimited){ lastMsg = err.message; break; } // премини веднага към следващия модел/доставчик
          if(err && err.transient===false) throw new Error(err.message);
          lastMsg = (err && err.message) || lastMsg;
          await new Promise(r=>setTimeout(r, 900*(attempt+1)));
        }
      }
    } else {
      // последно звено във веригата — изчерпваме всички опити, включително изчакване при rate limit
      for(let attempt=0; attempt<2; attempt++){
        try{ return await callProviderOnce(provider, model, messages); }
        catch(err){
          if(err && err.transient===false && !err.rateLimited) throw new Error(err.message);
          lastMsg = (err && err.message) || lastMsg;
          await new Promise(r=>setTimeout(r, 1100*(attempt+1)));
        }
      }
    }
  }
  throw new Error('Всички AI модели са временно претоварени или с изчерпан лимит. Опитай пак след малко. (' + lastMsg + ')');
}
function extractPseudoToolCalls(content){
  if(!content || content.indexOf('<function')===-1) return null;
  const calls = []; let cleaned = content;
  // По-широк regex — улавя <function=NAME ...>...</function> И <function=NAME={json}</function> (без затваряща '>')
  const re = /<function\s*=\s*([a-zA-Z_][\w]*)\s*=?\s*([\s\S]*?)<\/function>/g;
  let m, found = false;
  while((m = re.exec(content))){
    found = true;
    const name = m[1]; let mid = (m[2]||'').trim();
    mid = mid.replace(/^>/, '').trim();
    let args = {};
    let parsedJson = false;
    try{ const j = JSON.parse(mid); if(j && typeof j === 'object'){ args = j; parsedJson = true; } }catch(e){}
    if(!parsedJson){
      const attrRe = /([a-zA-Z_][\w]*)\s*=\s*"([^"]*)"/g; let am;
      while((am = attrRe.exec(mid))){ args[am[1]] = am[2]; }
    }
    calls.push({ id:'pseudo_' + calls.length + '_' + Date.now(), type:'function', function:{ name, arguments: JSON.stringify(args) } });
    cleaned = cleaned.replace(m[0], '');
  }
  if(!found) return null;
  return { calls, cleaned: cleaned.trim() };
}
function stripStrayTags(s){
  // защитна мрежа — премахва каквото е останало от недоразпознат/непълен <function...> тага
  return (s||'').replace(/<function[\s\S]*?(<\/function>|$)/gi, '').trim();
}
function looksBulgarian(text){
  const stripped = (text||'').replace(/[0-9.,€%\s\-:;!?()'"]/g, '');
  if(stripped.length < 6) return true; // твърде кратко за надеждна преценка
  const cyr = (stripped.match(/[а-яА-ЯЁё]/g) || []).length;
  return (cyr / stripped.length) > 0.5;
}
App.aiSend = async function(){
  const text = (App.state.aiInput||'').trim();
  if(!text || App.state.aiThinking) return;
  if(!EMBEDDED_WORKER_URL){ toast('AI не е настроен (липсва Worker URL).'); return; }
  if(!App.state.aiHistory.length){
    App.state.aiHistory.push({ role:'system', content: AI_SYSTEM_PROMPT.replace('__REST_NAME__', App.state.restaurant.name||'Огнище') });
  }
  App.state.aiMessages.push({ role:'user', text });
  App.state.aiHistory.push({ role:'user', content:text });
  setState({ aiInput:'', aiThinking:true });
  try{
    let guard = 0;
    let langRetries = 0;
    while(guard++ < 6){
      const msg = await callGroq(App.state.aiHistory);
      let toolCalls = msg.tool_calls || [];
      let visibleText = (msg.content||'').trim();
      if(!toolCalls.length){
        const pseudo = extractPseudoToolCalls(msg.content||'');
        if(pseudo && pseudo.calls.length){ toolCalls = pseudo.calls; visibleText = ''; }
      }
      if(toolCalls.length){
        App.state.aiHistory.push({ role:'assistant', content:null, tool_calls:toolCalls });
        for(const tc of toolCalls){
          const impl = AI_TOOL_IMPL[tc.function.name];
          let result;
          try{
            const args = tc.function.arguments ? JSON.parse(tc.function.arguments) : {};
            result = impl ? await impl(args) : { error:'Непознат инструмент. Наличните инструменти са: ' + Object.keys(AI_TOOL_IMPL).join(', ') };
          }catch(e){ result = { error: e.message }; }
          App.state.aiHistory.push({ role:'tool', tool_call_id:tc.id, content:JSON.stringify(result) });
        }
        const calledSummary = toolCalls.some(tc=>tc.function.name==='confirm_order_summary');
        if(calledSummary){
          // спираме автоматичния цикъл тук — резюмето вече е показано в чата;
          // изчакваме реален отговор от клиента, преди да позволим place_order
          App.state.aiHistory.push({ role:'assistant', content:'Изчаквам изрично потвърждение от клиента преди да продължа с поръчката.' });
          break;
        }
        continue;
      }
      // няма извикване на инструмент — финален текстов отговор
      visibleText = stripMarkdown(stripStrayTags(visibleText));
      if(visibleText && !looksBulgarian(visibleText) && langRetries < 1){
        // отговорът изглежда неразбираем/на друг език — пробваме веригата отново, без да го пазим в историята
        langRetries++;
        continue;
      }
      if(visibleText){
        App.state.aiHistory.push({ role:'assistant', content:visibleText });
        App.state.aiMessages.push({ role:'model', text:visibleText });
        speakBg(visibleText);
      }
      break;
    }
  }catch(e){
    App.state.aiMessages.push({ role:'model', text:'Извинявам се, възникна грешка: ' + e.message });
  }finally{
    setState({ aiThinking:false });
  }
};

    o.cutlery ? '🍴 Желае прибори' : '',
    o.notes ? `📝 Бележка: ${o.notes}` : ''
  ].filter(Boolean).join('\n');
  return `📦 Поръчка ${o.orderNum}\n👤 ${o.customer.name} · ${o.customer.phone}\n📍 ${o.customer.address}\n\n${lines}${extra?'\n\n'+extra:''}\n\nОбщо: ${lv(o.totals.total)} (${paymentLabel(o.paymentMethod, true)})`;

  if(navigator.share){

  }
  try{ await navigator.clipboard.writeText(text); toast('Поръчката е копирана в клипборда'); }
  catch(e){ toast('Не може да се копира автоматично'); }
};

  const itemsInCat = App.state.items.filter(i=>(i.categoryIds||[]).includes(id));
  const wouldOrphan = itemsInCat.filter(i=>(i.categoryIds||[]).length<=1);
  if(wouldOrphan.length>0){
    toast(`„${wouldOrphan[0].name}" остава без категория — добави му друга категория първо`);
    return;
  }
  try{
    for(const it of itemsInCat){
      const updated = { ...it, categoryIds: it.categoryIds.filter(c=>c!==id) };
      await DB.saveItem(updated);
      App.state.items = App.state.items.map(x=>x.id===it.id ? updated : x);
    }
    await DB.deleteCategory(id);
    App.state.categories = App.state.categories.filter(c=>c.id!==id);
    render(); toast('Категорията е изтрита');
  }catch(e){ toast('Грешка: '+e.message); }

function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>=h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } }
        else { if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } }
        const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror=()=>reject(new Error('bad image'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('read failed'));
    reader.readAsDataURL(file);
  });
}

  removeHandler = removeHandler || 'App.removePhoto()';
  return src

}

    <div id="combo-items-list">
      ${list.length===0 ? `<div class="muted" style="font-size:12.5px;margin-bottom:10px;">Няма артикули.</div>` :
        list.map((ci,idx)=>`
          <div class="row gap8" style="margin-bottom:8px;align-items:center;">
            <select style="flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px;" onchange="App.updateComboItem(${idx},'itemId',this.value)">
              ${App.state.items.map(it=>`<option value="${it.id}" ${ci.itemId===it.id?'selected':''}>${it.name}</option>`).join('')}
            </select>
            <input type="number" min="1" value="${ci.qty}" style="width:56px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px;text-align:center;" onchange="App.updateComboItem(${idx},'qty',this.value)">
            <button class="icon-btn" onclick="App.removeComboItem(${idx})">${icon('x',14)}</button>
          </div>`).join('')}
    </div>
    <button class="btn btn-ghost btn-sm" onclick="App.addComboItemRow()">${icon('plus',14)} Добави</button>
    <div class="field" style="margin-top:14px;"><label>Крайна цена на комбото (€)</label><input id="p-combo-price" type="number" step="0.10" value="${p.comboPrice||0}"></div>`;
}
App.renderPromoTypeFields = function(type){ App.state.editingPromo.type=type; document.getElementById('promo-type-fields').innerHTML=promoTypeFields(App.state.editingPromo); };
App.renderScopeFields = function(scope){ App.state.editingPromo.scope=scope; document.getElementById('scope-fields').innerHTML=scope==='category'?categoryFieldHtml(App.state.categories[0]?.id):''; };
App.updateComboItem = function(idx,field,value){ App._pendingComboItems[idx][field]=field==='qty'?(parseInt(value,10)||1):value; };
App.addComboItemRow = function(){ App._pendingComboItems.push({itemId:App.state.items[0]?.id,qty:1}); document.getElementById('promo-type-fields').innerHTML=promoTypeFields(App.state.editingPromo); };
App.removeComboItem = function(idx){ App._pendingComboItems.splice(idx,1); document.getElementById('promo-type-fields').innerHTML=promoTypeFields(App.state.editingPromo); };
App.handlePromoPhotoUpload = async function(event){
  const file=event.target.files&&event.target.files[0]; if(!file) return;
  try{ const d=await resizeImageFile(file,800,0.72); App._pendingPromoImage=d; const prev=document.getElementById('promo-photo-preview'); if(prev) prev.innerHTML=photoPreviewHtml(d,'App.removePromoPhoto()'); }
  catch(e){ toast('Снимката не може да се зареди'); }
};
App.removePromoPhoto = function(){ App._pendingPromoImage=null; const prev=document.getElementById('promo-photo-preview'); if(prev) prev.innerHTML=photoPreviewHtml(null,'App.removePromoPhoto()'); };
App.savePromo = async function(){
  const p = App.state.editingPromo;
  const type = document.getElementById('p-type').value;
  const updated = { id:p.id||uid(), title:document.getElementById('p-title').value.trim(), desc:(document.getElementById('p-desc').value||'').trim(), image:App._pendingPromoImage||null, type, active:document.querySelector('.switch').classList.contains('on') };
  if(type==='code'){ updated.code=(document.getElementById('p-code').value||'').trim().toUpperCase(); updated.percent=parseFloat(document.getElementById('p-percent').value)||0; updated.scope='order'; if(!updated.code){ toast('Въведи код'); return; } }
  else if(type==='combo'){ updated.comboPrice=parseFloat(document.getElementById('p-combo-price')?.value||0)||0; updated.comboItems=(App._pendingComboItems||[]).filter(ci=>ci.itemId); if(!updated.comboItems.length){ toast('Добави артикул'); return; } }
  else { updated.scope=document.getElementById('p-scope').value; if(updated.scope==='category'){ const cEl=document.getElementById('p-cat'); updated.categoryId=cEl?cEl.value:App.state.categories[0]?.id; } updated.percent=parseFloat(document.getElementById('p-percent').value)||0; }
  if(!updated.title){ toast('Въведи заглавие'); return; }
  try{
    await DB.savePromo(updated);
    let promos = App.state.promos;
    if(p.id) promos=promos.map(x=>x.id===p.id?updated:x); else promos=[...promos, updated];
    App.state.promos = promos;
    setState({ editingPromo:null, showPromoModal:false }); toast('Промоцията е запазена');
  }catch(e){ toast('Грешка: '+e.message); }
};
App.deletePromo = async function(id){
  try{ await DB.deletePromo(id); App.state.promos=App.state.promos.filter(p=>p.id!==id); render(); toast('Изтрита'); }
  catch(e){ toast('Грешка: '+e.message); }
};

/* ============================= RESTAURANT: LOYALTY ============================= */
function scrRestLoyalty(){
  const l = App.state.loyalty;
  return `<div class="scr">${restHeader()}${alarmBanner()}${restTabs()}
    <div class="pad" style="padding-top:0;">
      <div class="card">
        <div class="field"><label>Точки за всеки 1 € от поръчката</label><input id="l-points" type="number" step="0.1" value="${l.pointsPerLev}"></div>
        <div class="field"><label>Такса доставка (€)</label><input id="l-delivery" type="number" step="0.10" value="${l.deliveryFee}"></div>
      </div>
      <div class="eyebrow" style="margin:18px 0 8px;">Нива на лоялност</div>
      ${l.tiers.map((t,idx)=>`
        <div class="card row gap8" style="margin-bottom:8px;align-items:flex-end;">
          <div class="field" style="flex:1;margin-bottom:0;"><label>Име</label><input value="${t.name}" onchange="App.updateTier(${idx},'name',this.value)"></div>
          <div class="field" style="flex:1;margin-bottom:0;"><label>От точки</label><input type="number" value="${t.minPoints}" onchange="App.updateTier(${idx},'minPoints',this.value)"></div>
          <div class="field" style="flex:1;margin-bottom:0;"><label>Отстъпка %</label><input type="number" value="${t.percent}" onchange="App.updateTier(${idx},'percent',this.value)"></div>
        </div>`).join('')}
      <button class="btn btn-ghost btn-sm" onclick="App.addTier()">${icon('plus',14)} Добави ниво</button>
      <button class="btn btn-primary" style="margin-top:20px;" onclick="App.saveLoyalty()">Запази настройките</button>
    </div>
  </div>`;
}
App.updateTier = function(idx,field,value){ App.state.loyalty.tiers[idx][field]=(field==='name')?value:parseFloat(value)||0; };
App.addTier = function(){ App.state.loyalty.tiers.push({name:'Ново ниво',minPoints:0,percent:0}); render(); };
App.saveLoyalty = async function(){
  App.state.loyalty.pointsPerLev = parseFloat(document.getElementById('l-points').value)||0;
  App.state.loyalty.deliveryFee = parseFloat(document.getElementById('l-delivery').value)||0;
  try{ await DB.saveLoyalty(App.state.loyalty); toast('Настройките са запазени'); render(); }
  catch(e){ toast('Грешка: '+e.message); }
};

/* ============================= RESTAURANT: DESIGN ============================= */
function scrRestDesign(){
  const r = App.state.restaurant;
  return `<div class="scr">${restHeader()}${alarmBanner()}${restTabs()}
    <div class="pad" style="padding-top:0;">
      <div class="eyebrow" style="margin-bottom:8px;">Облик на хедъра</div>
      <div class="field"><label>Име на ресторанта</label><input id="r-name" value="${r.name}"></div>
      <div class="field"><label>Слоган</label><input id="r-tagline" value="${r.tagline}"></div>
      <div class="field"><label>Телефон за връзка</label><input id="r-phone" value="${r.contact_phone||''}" placeholder="+359 88 123 4567" inputmode="tel"></div>
      <div class="field">
        <label>Лого (показва се в горната лента)</label>
        <input type="file" accept="image/*" onchange="App.handleLogoUpload(event)" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px;">
        <div id="logo-preview" style="margin-top:8px;">${logoPreviewHtml(r.logo_image||null)}</div>
      </div>
      <div class="field">
        <label>Банер снимка (горна част на менюто)</label>
        <input type="file" accept="image/*" onchange="App.handleCoverUpload(event)" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px;">
        <div id="cover-preview" style="margin-top:8px;">${coverPreviewHtml(r.cover_image||null)}</div>
      </div>
      <button class="btn btn-primary" onclick="App.saveRestaurantDesign()">Запази оформлението</button>

      <div class="eyebrow" style="margin:26px 0 8px;">Начини на плащане за клиента</div>
      <div class="muted" style="font-size:12.5px;margin-bottom:10px;">Изберете кои начини на плащане да се показват при завършване на поръчка.</div>
      <div class="col gap8">
        ${PAYMENT_METHODS.map(m=>{
          const checked = (r.payment_methods||DEFAULT_RESTAURANT.payment_methods).includes(m.id);
          return `<label class="role-card" style="padding:12px 14px;cursor:pointer;">
            <input type="checkbox" id="pm-${m.id}" ${checked?'checked':''} style="width:18px;height:18px;accent-color:var(--ember);">
            <div class="icon-btn">${icon(m.icon,16)}</div>
            <div style="font-weight:600;font-size:13.5px;">${m.label}</div>
          </label>`;
        }).join('')}
      </div>
      <button class="btn btn-primary" style="margin-top:14px;" onclick="App.savePaymentMethods()">Запази начините на плащане</button>
    </div>
  </div>`;
}
function coverPreviewHtml(src){
  return src
    ? `<div class="col gap8"><img src="${src}" style="width:100%;height:110px;object-fit:cover;border-radius:10px;border:1px solid var(--border);"><button class="btn btn-ghost btn-sm" style="width:auto;" onclick="App.removeCoverImage()">Премахни</button></div>`
    : `<div class="muted" style="font-size:12px;">Няма банер.</div>`;
}
function logoPreviewHtml(src){
  return src
    ? `<div class="row gap8" style="align-items:center;"><img src="${src}" style="width:56px;height:56px;object-fit:cover;border-radius:12px;border:1px solid var(--border);"><button class="btn btn-ghost btn-sm" onclick="App.removeLogoImage()">Премахни</button></div>`
    : `<div class="muted" style="font-size:12px;">Няма лого — ще се показва пламъче.</div>`;
}
App.handleCoverUpload = async function(event){
  const file=event.target.files&&event.target.files[0]; if(!file) return;
  try{ const d=await resizeImageFile(file,1000,0.72); App._pendingCoverImage=d; const prev=document.getElementById('cover-preview'); if(prev) prev.innerHTML=coverPreviewHtml(d); }
  catch(e){ toast('Снимката не може да се зареди'); }
};
App.removeCoverImage = function(){ App._pendingCoverImage=null; const prev=document.getElementById('cover-preview'); if(prev) prev.innerHTML=coverPreviewHtml(null); };
App.handleLogoUpload = async function(event){
  const file=event.target.files&&event.target.files[0]; if(!file) return;
  try{ const d=await resizeImageFile(file,300,0.8); App._pendingLogoImage=d; const prev=document.getElementById('logo-preview'); if(prev) prev.innerHTML=logoPreviewHtml(d); }
  catch(e){ toast('Снимката не може да се зареди'); }
};
App.removeLogoImage = function(){ App._pendingLogoImage=null; const prev=document.getElementById('logo-preview'); if(prev) prev.innerHTML=logoPreviewHtml(null); };
App.saveRestaurantDesign = async function(){
  const updated = { name:document.getElementById('r-name').value.trim()||'Огнище', tagline:document.getElementById('r-tagline').value.trim(), contact_phone:(document.getElementById('r-phone').value||'').trim(), cover_image:App._pendingCoverImage||null, logo_image:App._pendingLogoImage||null };
  try{
    await DB.saveRestaurant(updated);
    App.state.restaurant = { ...App.state.restaurant, ...updated };
    toast('Оформлението е запазено'); render();
  }catch(e){ toast('Грешка: '+e.message); }
};

App.savePaymentMethods = async function(){
  const ids = PAYMENT_METHODS.filter(m=>{ const el=document.getElementById('pm-'+m.id); return el && el.checked; }).map(m=>m.id);
  if(!ids.length){ toast('Избери поне един начин на плащане'); return; }
  const updated = { ...App.state.restaurant, payment_methods:ids };
  try{
    await DB.saveRestaurant(updated);
    App.state.restaurant = updated;
    if(!ids.includes(App.state.paymentMethod)) App.state.paymentMethod = ids[0];
    toast('Начините на плащане са запазени'); render();
  }catch(e){ toast('Грешка: '+e.message); }
};

/* ============================= START ============================= */
init();

</script>
</body>
</html>
